# five_guys.yaml — Five Guys UK menu.
#
# 30 entries covering the full UK menu: burgers (regular + little),
# hot dogs, fries (regular + Cajun, three sizes each), milkshakes,
# and add-ons.
#
# Source: fiveguys.co.uk/nutritional-information (UK kcal labelling
# regs require chains > 250 employees to publish; Five Guys exceeds).
#
# Portion units:
#   • Burgers + hot dogs → `piece` (the whole sandwich)
#   • Fries → `pack` (the cup; sizes differ by gram weight)
#   • Milkshakes → `ml` (volumetric, per-100ml macros)
#   • Add-ons (bacon strip, cheese slice) → `slice`/`piece`

