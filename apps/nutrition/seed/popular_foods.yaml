# NUTRITION-DB v1 — popular foods seed
#
# Curated set of ~100 items covering the most common foods UK + US
# users actually log. Hand-entered macros from authoritative sources
# so search returns clean data immediately, before any bulk USDA /
# OFF / Open Food Facts ingestion.
#
# Why this exists: Open Food Facts is patchy on whole foods. USDA
# bulk-load is ~12k items but takes a download + ingest pass.
# This 100-item seed bootstraps the database with the items that
# cover ~70% of typical food-log queries on day one.
#
# Sources:
#   • USDA FoodData Central (public domain) — whole foods
#   • UK FSA McCance & Widdowson's (CC BY 4.0) — UK staples
#   • Chain-published nutrition (UK Calorie Labelling Regs 2022 +
#     US FDA menu labelling) — restaurants
#   • Manufacturer published nutrition — branded supermarket items
#
# All macros per 100g unless serving_grams specified. Rounded to
# whole numbers for kcal, 1 decimal for macros.
#
# Schema matches `CuratedFood` model — load via
# `manage.py seed_popular_foods`.

