# whole_foods.yaml — generic, no-brand whole foods.
#
# These are the ingredients people log every day. Macros are
# per-100g (always); `portion_unit` + `unit_grams` express the
# everyday unit so the iOS picker can show "1 egg / 2 / 3" instead
# of "50g / 100g / 150g".
#
# Sourcing: USDA FoodData Central (Foundation + SR Legacy) for
# whole foods. Public domain. Macros normalised to as-eaten
# (cooked rice, not raw rice; cooked pasta, not dry).
#
# Allergen / dietary tags are conservative — present only when
# provably true.

