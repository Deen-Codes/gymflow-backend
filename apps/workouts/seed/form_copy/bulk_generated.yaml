- name: Dumbbell Seated One-Leg Calf Raise
  form_description: |
    Set up for the Dumbbell Seated One-Leg Calf Raise with the balls of the feet on a raised platform or step and the heels free to drop below. Drop the heels for a full stretch at the bottom, then drive up onto the toes and squeeze the calves hard at the top. The slow lengthening phase matters most — three seconds down beats a fast bounce.
  common_mistakes: |
    - Bouncing reps for tendon spring instead of calf work
    - Cutting the bottom stretch short
    - Letting the knees drift inward through the rep
    - Going through the motion without pausing at the top contraction
  breathing_cues: |
    Inhale on the descent, exhale at the top squeeze.
  primary_benefit: |
    Builds the calves through a long stretch-to-contraction range — the only way to grow lower legs that have been stubborn.
- name: Dumbbell Side Bend
  form_description: |
    Set up for the Dumbbell Side Bend with the spine neutral and the lower back kept flat — no arching, no lifting the hips. Curl the torso up by contracting the abs, leading with the chest rather than yanking with the arms. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    A direct ab loader that scales with tempo — slow the eccentric and the muscle does more work per rep.
- name: Dumbbell Squat
  form_description: |
    Set up for the Dumbbell Squat with the feet at hip-to-shoulder width, toes turned out slightly. Descend by sitting between the hips, keeping the torso angle steady and the heels planted. Drive up through mid-foot to stand, stopping just short of locking out at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Works the quads and glutes together with serious weight — the lift other leg work is measured against.
- name: Dumbbell Squat To A Bench
  form_description: |
    Get into the Dumbbell Squat To A Bench with the chest tall and the upper back braced before the descent. Lower under control by bending the knees and hips together — knees track over the toes the whole way. Drive up through mid-foot to stand, stopping just short of locking out at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Trains the squat pattern under load — the workhorse for building lower-body size and power.
- name: Dumbbell Step Ups
  form_description: |
    Take the Dumbbell Step Ups stance with the feet flat and the weight loaded over mid-foot. Descend by sitting between the hips, keeping the torso angle steady and the heels planted. Stand up by pushing the floor away, finishing tall without leaning back hard at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
