- name: Kettlebell Dead Clean
  form_description: |
    Take the Kettlebell Dead Clean stance with a flat back and the chest up before the hinge begins. Lower by sliding the hips back and feeling the hamstrings load — the knees stay soft, not breaking forward. Reverse the hinge by pushing the hips through, finishing upright without overextending the lower back.
  common_mistakes: |
    - Rounding the lower back to chase range
    - Bending the knees through the lift — turns it into a squat
    - Going so heavy the hamstrings can't control the lower
    - Hyperextending the lower back at lockout
  breathing_cues: |
    Big breath at the top, brace through the hinge, exhale on the way up.
  primary_benefit: |
    Loads the hamstrings under deep stretch — the highest-output way to build hamstring size and posterior-chain strength.
- name: Kettlebell Figure 8
