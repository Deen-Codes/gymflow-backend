- name: Dumbbell Floor Press
  form_description: |
    Set up for the Dumbbell Floor Press with the bar racked or loaded for the strongest line of pull. Brace hard through the trunk and move the bar in a controlled, straight path. Lock out fully at the top of the lift without overextending the spine, then reset between reps.
  common_mistakes: |
    - Losing the brace mid-rep and dumping the load into the lower back
    - Letting the bar drift off the strongest line of pull
    - Going too heavy and grinding through breaking form
    - Skipping the reset between reps and accumulating sloppy reps
  breathing_cues: |
    Big breath at the start, hold through the lift, exhale at lockout.
  primary_benefit: |
    Builds maximum strength in the competition pattern — useful for serious lifters peaking for a meet.
- name: Dumbbell Flyes
  form_description: |
    Set up for the Dumbbell Flyes with a soft bend in the elbows — not locked straight, not deeply bent. Lower under control through a long stretch, keeping the elbow angle fixed. Bring the hands back together by squeezing the chest fibres — the elbows stay in their fixed bend.
  common_mistakes: |
    - Bending the elbows mid-rep to turn it into a press
    - Letting the hands fly open at the bottom and yank the shoulder
    - Shrugging the shoulders up to assist the squeeze
    - Cutting the bottom range short and missing the chest stretch
  breathing_cues: |
    Inhale as the arms open, exhale as you squeeze them together.
  primary_benefit: |
    Isolates the chest under direct tension — grows the inner pec line without overloading the shoulder.
- name: Dumbbell Incline Row
  form_description: |
    Get into the Dumbbell Incline Row starting position with a flat back and the weight under control before the pull begins. Drive the elbows down and back, feeling the lats engage before the biceps take over. Squeeze the mid-back at the top of the pull, then return under control to a full stretch.
  common_mistakes: |
    - Pulling with the biceps instead of the back
    - Shrugging the shoulders up at the top instead of squeezing back
    - Cutting the bottom range short and missing the stretch
    - Using body english to throw the weight up
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Loads the back through a complete pulling arc — grows both width and thickness in one lift.
- name: Dumbbell Incline Shoulder Raise
  form_description: |
    Stand or sit with the weights at the sides, elbows softly bent. Raise the arms out in a smooth arc, leading with the elbows, until the upper arms reach parallel with the floor. Stop there — going higher recruits the traps. Lower slowly; the lengthening phase is where the side delts grow.
  common_mistakes: |
    - Swinging the weights up with momentum
    - Going past parallel and shrugging the traps in
    - Locking the elbows straight under load
    - Rotating the wrists down (pour-the-jug) — shifts work off the side delt
  breathing_cues: |
    Inhale at the bottom, exhale as you raise the arms.
  primary_benefit: |
    Direct loading for the side delts — builds shoulder width that pressing alone underdose.
- name: Dumbbell Lunges
  form_description: |
    Take the Dumbbell Lunges stance with the feet flat and the weight loaded over mid-foot. Bend the knees and hips together to lower into the bottom — let the chest stay up rather than tipping forward. Drive up through mid-foot to stand, stopping just short of locking out at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Loads the quads heavily through a long range — a foundational lift for adding leg size and strength.
- name: Dumbbell Lying One-Arm Rear Lateral Raise
  form_description: |
    Set up for the Dumbbell Lying One-Arm Rear Lateral Raise with the torso tipped forward and a soft bend in the elbows. Raise the arms out to the sides by driving through the elbows — not by yanking with the hands. Stop when the upper arms are roughly parallel to the floor, squeeze through the rear delts and shoulder blades, then lower under control.
  common_mistakes: |
    - Standing too upright and turning it into a row
    - Using momentum to swing the weights up
    - Lifting with the traps instead of the rear delts
    - Locking the elbows straight under load
  breathing_cues: |
    Exhale as you raise, inhale on the lower.
  primary_benefit: |
    Isolates the rear delts — the cheapest insurance against pressing-heavy shoulder pain.
- name: Dumbbell Lying Pronation
  form_description: |
    Set up for the Dumbbell Lying Pronation with the forearms supported and the wrists free to move through their full range. Curl the weight up by flexing through the wrist or rotating the forearm — the elbow stays still. Pause at the top of the contraction, then lower under control through a full stretch.
  common_mistakes: |
    - Lifting the elbow off the support to cheat the rep
    - Rushing the eccentric and missing the stretch
    - Going so heavy the grip fails before the forearm does
    - Half-repping at the top of the contraction
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Direct loading for the forearms — builds the grip strength that holds heavy compounds together.
- name: Dumbbell Lying Rear Lateral Raise
  form_description: |
