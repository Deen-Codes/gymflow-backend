- name: Seated Cable Rows
  form_description: |
    Get into the Seated Cable Rows starting position with a flat back and the weight under control before the pull begins. Drive the elbows down and back, feeling the lats engage before the biceps take over. Pause briefly at the contraction, then lower slowly so the back eccentric-loads.
  common_mistakes: |
    - Pulling with the biceps instead of the back
    - Shrugging the shoulders up at the top instead of squeezing back
    - Cutting the bottom range short and missing the stretch
    - Using body english to throw the weight up
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Loads the back through a complete pulling arc — grows both width and thickness in one lift.
- name: Seated Cable Shoulder Press
  form_description: |
    Set up for the Seated Cable Shoulder Press sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: Seated Calf Stretch
  form_description: |
    Ease into the Seated Calf Stretch with the heel pressing down and the front foot supporting the body. Hold the position where you feel a clear stretch through the calf, breathing steadily. Back off if you feel sharp pain in the achilles — the stretch should sit in the belly of the muscle.
  common_mistakes: |
    - Bouncing into and out of the stretch
    - Forcing past sharp pain
    - Letting the foot roll out and dumping the stretch
    - Holding the breath under tension
  breathing_cues: |
    Breathe slowly and steadily — exhale into each hold.
  primary_benefit: |
    Opens the calves and achilles — useful warm-up before sprinting or jumping work.
- name: Seated Close-Grip Concentration Barbell Curl
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Loads the biceps directly — a clean way to add arm volume without leaning on compound pulls.
- name: Seated Dumbbell Curl
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
