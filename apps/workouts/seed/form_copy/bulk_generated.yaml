- name: Sandbag Load
  form_description: |
    Set up for the Sandbag Load with the implement racked or gripped in the strongest position. Move the load through its full path under steady control — the implement is heavy and form is what keeps the joints intact. Finish the rep or carry in a stable position before resetting for the next attempt.
  common_mistakes: |
    - Letting the lower back round under heavy load
    - Going past clean form to add reps or distance
    - Skipping warm-up sets and going straight to heavy
    - Holding the breath through the whole rep — brace and breathe in cycles
  breathing_cues: |
    Breathe in cycles — brace for the rep, exhale briefly between reps.
  primary_benefit: |
    Builds whole-body strength under awkward load — the kind of work that translates to real-world lifting.
- name: Scapular Pull-Up
  form_description: |
    Stand tall with the weight at arm's length, arms straight, shoulders relaxed at the start. Shrug the shoulders straight up towards the ears as high as they will go. Pause at the top, then lower under control to a full stretch without rolling the shoulders forward.
  common_mistakes: |
    - Rolling the shoulders forward through the rep
    - Bending the elbows to fold the weight up
    - Cutting the top range short
    - Using so much weight the bar barely moves
  breathing_cues: |
    Exhale as you shrug up, inhale as you lower.
  primary_benefit: |
    Direct loading for the upper traps — fills out the top of the shoulder line that pulling lifts alone often miss.
- name: Scissor Kick
  form_description: |
    Ease into the Scissor Kick slowly, letting the tissue lengthen rather than forcing the range. Find the position where you feel a clear stretch in the target muscle and hold with steady breathing. Back off the moment a sharp sensation appears — the goal is mobility, not a fight with the joint.
  common_mistakes: |
    - Bouncing in and out of the stretch
    - Forcing past sharp pain
    - Holding the breath under tension
    - Letting the body twist sideways and dumping the stretch
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the target tissue — useful warm-up to clear a range or cool-down between heavy sessions.
- name: Scissors Jump
  form_description: |
    Set up for the Scissors Jump with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Seated Band Hamstring Curl
  form_description: |
    Set up for the Seated Band Hamstring Curl with the pad sitting just above the heels and the knees just past the bench edge. Drive the heels back by squeezing the hamstrings — keep the rest of the body still. Hold the top contraction for a beat, then return slowly so the hamstrings eccentric-load.
  common_mistakes: |
    - Lifting the hips off the bench to gain range
    - Banging the stack at the bottom (no controlled eccentric)
    - Half-repping — the top contraction is where it matters
    - Pad placed too far up the calf, working the achilles instead
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Isolates the hamstrings at the knee — grows the lower hamstring belly that hip-hinge work alone leaves behind.
- name: Seated Barbell Military Press
  form_description: |
    Set up for the Seated Barbell Military Press sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: Seated Barbell Twist
  form_description: |
    Take the start position with the head neutral and the chin off the chest — don't pull on the neck to fold up. Curl the torso up by contracting the abs, leading with the chest rather than yanking with the arms. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    A direct ab loader that scales with tempo — slow the eccentric and the muscle does more work per rep.
- name: Seated Bent-Over One-Arm Dumbbell Triceps Extension
  form_description: |
    Set up for the Seated Bent-Over One-Arm Dumbbell Triceps Extension with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Seated Bent-Over Rear Delt Raise
  form_description: |
    Set up for the Seated Bent-Over Rear Delt Raise with the torso tipped forward and a soft bend in the elbows. Raise the arms out to the sides by driving through the elbows — not by yanking with the hands. Stop when the upper arms are roughly parallel to the floor, squeeze through the rear delts and shoulder blades, then lower under control.
  common_mistakes: |
    - Standing too upright and turning it into a row
    - Using momentum to swing the weights up
    - Lifting with the traps instead of the rear delts
    - Locking the elbows straight under load
  breathing_cues: |
    Exhale as you raise, inhale on the lower.
  primary_benefit: |
    Isolates the rear delts — the cheapest insurance against pressing-heavy shoulder pain.
- name: Seated Bent-Over Two-Arm Dumbbell Triceps Extension
  form_description: |
    Set up for the Seated Bent-Over Two-Arm Dumbbell Triceps Extension with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
