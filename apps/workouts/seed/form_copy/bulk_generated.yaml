- name: Calf Stretch Elbows Against Wall
  form_description: |
    Ease into the Calf Stretch Elbows Against Wall with the heel pressing down and the front foot supporting the body. Hold the position where you feel a clear stretch through the calf, breathing steadily. Back off if you feel sharp pain in the achilles — the stretch should sit in the belly of the muscle.
  common_mistakes: |
    - Bouncing into and out of the stretch
    - Forcing past sharp pain
    - Letting the foot roll out and dumping the stretch
    - Holding the breath under tension
  breathing_cues: |
    Breathe slowly and steadily — exhale into each hold.
  primary_benefit: |
    Opens the calves and achilles — useful warm-up before sprinting or jumping work.
- name: Calf Stretch Hands Against Wall
  form_description: |
    Ease into the Calf Stretch Hands Against Wall with the heel pressing down and the front foot supporting the body. Hold the position where you feel a clear stretch through the calf, breathing steadily. Back off if you feel sharp pain in the achilles — the stretch should sit in the belly of the muscle.
