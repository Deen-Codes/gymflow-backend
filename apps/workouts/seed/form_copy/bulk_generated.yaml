- name: One-Arm Overhead Kettlebell Squats
  form_description: |
    Get into the One-Arm Overhead Kettlebell Squats with the chest tall and the upper back braced before the descent. Lower under control by bending the knees and hips together — knees track over the toes the whole way. Reverse the descent by driving through the heels and mid-foot until you reach the top position.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Loads the quads heavily through a long range — a foundational lift for adding leg size and strength.
- name: One-Arm Side Deadlift
  form_description: |
    Set up for the One-Arm Side Deadlift with the feet at hip-to-shoulder width, toes turned out slightly. Descend by sitting between the hips, keeping the torso angle steady and the heels planted. Drive up through mid-foot to stand, stopping just short of locking out at the top.
