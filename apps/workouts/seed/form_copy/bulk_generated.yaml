    - Letting the wrists hyperextend under load
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Loads the biceps directly — a clean way to add arm volume without leaning on compound pulls.
- name: Dumbbell Bench Press with Neutral Grip
  form_description: |
    Set up for the Dumbbell Bench Press with Neutral Grip with the shoulder blades pinned back and down, feet planted firmly. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Drive the weight back up by squeezing the chest, stopping just short of a hard lockout.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the chest under heavy load through a long range — the foundational pressing lift for size and strength.
- name: Dumbbell Bicep Curl
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
