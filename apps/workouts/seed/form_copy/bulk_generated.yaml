    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: Standing Palms-Up Barbell Behind The Back Wrist Curl
  form_description: |
    Set up for the Standing Palms-Up Barbell Behind The Back Wrist Curl with the forearms supported and the wrists free to move through their full range. Curl the weight up by flexing through the wrist or rotating the forearm — the elbow stays still. Pause at the top of the contraction, then lower under control through a full stretch.
  common_mistakes: |
    - Lifting the elbow off the support to cheat the rep
    - Rushing the eccentric and missing the stretch
    - Going so heavy the grip fails before the forearm does
    - Half-repping at the top of the contraction
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Direct loading for the forearms — builds the grip strength that holds heavy compounds together.
- name: Standing Pelvic Tilt
  form_description: |
    Ease into the Standing Pelvic Tilt slowly, letting the lower back lengthen rather than forcing the position. Find the spot where you feel a clear stretch through the spine and hold it with steady breathing. Stop short of sharp pain — the lumbar spine doesn't want to be forced under tension.
  common_mistakes: |
    - Forcing past sharp pain in the lower back
    - Holding the breath under tension
    - Bouncing in and out instead of holding a steady position
    - Letting the hips tilt to one side mid-stretch
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Lengthens the lower-back muscles — useful recovery work between heavy hinge or squat sessions.
- name: Standing Rope Crunch
  form_description: |
    Set up for the Standing Rope Crunch with the spine neutral and the lower back kept flat — no arching, no lifting the hips. Curl the torso up by contracting the abs, leading with the chest rather than yanking with the arms. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    A direct ab loader that scales with tempo — slow the eccentric and the muscle does more work per rep.
- name: Standing Soleus And Achilles Stretch
  form_description: |
    Ease into the Standing Soleus And Achilles Stretch with the heel pressing down and the front foot supporting the body. Hold the position where you feel a clear stretch through the calf, breathing steadily. Back off if you feel sharp pain in the achilles — the stretch should sit in the belly of the muscle.
  common_mistakes: |
    - Bouncing into and out of the stretch
    - Forcing past sharp pain
    - Letting the foot roll out and dumping the stretch
    - Holding the breath under tension
  breathing_cues: |
    Breathe slowly and steadily — exhale into each hold.
  primary_benefit: |
    Opens the calves and achilles — useful warm-up before sprinting or jumping work.
- name: Standing Toe Touches
  form_description: |
    Ease into the Standing Toe Touches slowly, letting the hamstrings lengthen rather than forcing the range. Find the position where you feel a clear stretch behind the thigh and hold it with steady breathing. Back off the moment a sharp sensation appears — that's the joint, not the muscle.
  common_mistakes: |
    - Bouncing in and out instead of holding a steady position
    - Rounding the lower back to chase more range
    - Holding the breath under tension
    - Forcing past pain instead of easing in
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the hamstrings — useful warm-up or recovery work between heavy hinge sessions.
- name: Standing Towel Triceps Extension
  form_description: |
    Set up for the Standing Towel Triceps Extension with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
