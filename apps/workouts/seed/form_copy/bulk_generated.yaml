- name: Sit Squats
  form_description: |
    Take the Sit Squats position slowly, easing into the stretch rather than forcing it. Once you feel a clear tension through the front of the thigh, hold the position with steady breathing. Stop short of any sharp pain — the goal is lengthened tissue, not a fight with the joint.
  common_mistakes: |
    - Forcing the stretch past pain instead of easing in
    - Holding the breath under tension
    - Letting the hips tilt to one side and dumping the stretch
    - Bouncing in and out instead of holding a steady position
  breathing_cues: |
    Breathe slowly and steadily — exhale into the deeper part of each hold.
  primary_benefit: |
    Lengthens the quad and hip flexor — useful warm-up or cool-down work for lifters who squat heavy.
- name: Skating
  form_description: |
    Set up for the Skating with the body in a clean working position and the breath ready to settle into rhythm. Work at an effort that matches the session — easy aerobic, threshold, or sprint — rather than starting hot. Keep the form clean through the whole bout; fatigue should slow you down, not break your posture.
  common_mistakes: |
    - Starting too hard and blowing up the second half of the session
    - Letting form break as fatigue sets in
    - Mouth-breathing only — keep some nasal work in for aerobic sets
    - Skipping the cool-down and stacking cardiovascular stress
  breathing_cues: |
    Breathe in rhythm with the work — nasal where you can, mouth-and-nose at higher efforts.
  primary_benefit: |
    Builds cardiovascular base — useful for recovery between heavy sessions and for long-term work capacity.
- name: Sled Drag - Harness
  form_description: |
    Set up for the Sled Drag - Harness with the implement racked or gripped in the strongest position. Move the load through its full path under steady control — the implement is heavy and form is what keeps the joints intact. Finish the rep or carry in a stable position before resetting for the next attempt.
  common_mistakes: |
    - Letting the lower back round under heavy load
    - Going past clean form to add reps or distance
    - Skipping warm-up sets and going straight to heavy
    - Holding the breath through the whole rep — brace and breathe in cycles
  breathing_cues: |
    Breathe in cycles — brace for the rep, exhale briefly between reps.
  primary_benefit: |
    Builds whole-body strength under awkward load — the kind of work that translates to real-world lifting.
- name: Sled Overhead Backward Walk
  form_description: |
    Set up for the Sled Overhead Backward Walk with the bar or weight at shoulder height, ribs braced, feet planted. Drive the weight up by extending through the shoulders, keeping the bar path close to the face. Finish overhead with the head pushed slightly forward so the bar sits over mid-foot. Lower under control to the start position.
  common_mistakes: |
    - Pressing the bar in front of the face instead of overhead
    - Hyperextending the lower back at lockout
    - Letting the elbows flare wide at the bottom
    - Cutting the bottom range short
  breathing_cues: |
    Inhale at the top, brace through the descent, exhale through the press.
  primary_benefit: |
    Builds overhead pressing strength through the shoulder girdle — a full upper-body strength lift, not just a delt builder.
- name: Sled Overhead Triceps Extension
  form_description: |
    Set up for the Sled Overhead Triceps Extension with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Sled Push
  form_description: |
    Set up for the Sled Push with the implement racked or gripped in the strongest position. Move the load through its full path under steady control — the implement is heavy and form is what keeps the joints intact. Finish the rep or carry in a stable position before resetting for the next attempt.
  common_mistakes: |
    - Letting the lower back round under heavy load
    - Going past clean form to add reps or distance
    - Skipping warm-up sets and going straight to heavy
    - Holding the breath through the whole rep — brace and breathe in cycles
  breathing_cues: |
