- name: Depth Jump Leap
  form_description: |
    Set up for the Depth Jump Leap with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Dip Machine
  form_description: |
    Set up for the Dip Machine with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Double Kettlebell Alternating Hang Clean
  form_description: |
    Take the Double Kettlebell Alternating Hang Clean stance with a flat back and the chest up before the hinge begins. Lower by sliding the hips back and feeling the hamstrings load — the knees stay soft, not breaking forward. Drive the hips forward to stand tall, squeezing the glutes at the top without leaning back.
  common_mistakes: |
    - Rounding the lower back to chase range
    - Bending the knees through the lift — turns it into a squat
    - Going so heavy the hamstrings can't control the lower
    - Hyperextending the lower back at lockout
  breathing_cues: |
    Big breath at the top, brace through the hinge, exhale on the way up.
  primary_benefit: |
    Loads the hamstrings under deep stretch — the highest-output way to build hamstring size and posterior-chain strength.
- name: Double Kettlebell Jerk
  form_description: |
    Set up for the Double Kettlebell Jerk sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: Double Kettlebell Push Press
  form_description: |
    Set up for the Double Kettlebell Push Press sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: Double Kettlebell Snatch
  form_description: |
    Set up for the Double Kettlebell Snatch with the bar or weight at shoulder height, ribs braced, feet planted. Drive the weight up by extending through the shoulders, keeping the bar path close to the face. Finish overhead with the head pushed slightly forward so the bar sits over mid-foot. Lower under control to the start position.
  common_mistakes: |
    - Pressing the bar in front of the face instead of overhead
    - Hyperextending the lower back at lockout
    - Letting the elbows flare wide at the bottom
    - Cutting the bottom range short
  breathing_cues: |
    Inhale at the top, brace through the descent, exhale through the press.
  primary_benefit: |
    Builds overhead pressing strength through the shoulder girdle — a full upper-body strength lift, not just a delt builder.
- name: Double Kettlebell Windmill
  form_description: |
    Get into the Double Kettlebell Windmill starting position with the ribs stacked over the hips and the lower back pressed lightly into the floor or pad. Curl the torso up by contracting the abs, leading with the chest rather than yanking with the arms. Hold the top position for a count, then return slowly so the abs eccentric-load on the way down.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Trains the abs under steady tension — the kind of work that builds ab thickness rather than just endurance.
- name: Double Leg Butt Kick
  form_description: |
    Set up for the Double Leg Butt Kick with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Downward Facing Balance
  form_description: |
    Set up for the Downward Facing Balance with the spine neutral and the working leg ready to move through its full range. Drive the working leg back or up by contracting the glute, not by arching the lower back. Squeeze at the top of the range, then lower under control to the start position.
  common_mistakes: |
    - Arching the lower back instead of contracting the glute
    - Swinging the leg with momentum
    - Cutting the top squeeze short
    - Going so heavy form breaks before the muscle works
  breathing_cues: |
    Inhale at the start, exhale as you drive the leg back.
  primary_benefit: |
    Directly loads the glute through hip extension — useful for adding glute volume without taxing the lower back.
- name: Drag Curl
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Builds the biceps in a strict pulling line — the bread-and-butter arm lift across every programme.
- name: Drop Push
  form_description: |
    Set up for the Drop Push with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
