- name: Weighted Ball Hyperextension
  form_description: |
    Set up for the Weighted Ball Hyperextension with a flat back and the spine kept neutral throughout. Hinge or extend at the hips by driving from the glutes and lower back together. Stop at neutral spine alignment — going past straight under load stresses the lumbar joints without adding muscle work.
  common_mistakes: |
    - Hyperextending past straight at the top
    - Rounding the lower back to chase range
    - Using momentum on the way up
    - Loading so heavy form breaks before the set ends
  breathing_cues: |
    Inhale on the descent, exhale on the way up.
  primary_benefit: |
    Loads the spinal erectors and posterior chain together — builds the lower back endurance that heavy compounds demand.
- name: Weighted Ball Side Bend
  form_description: |
    Take the start position with the head neutral and the chin off the chest — don't pull on the neck to fold up. Drive the ribcage towards the hips by shortening the abs, not by hinging at the hips. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Trains the abs under steady tension — the kind of work that builds ab thickness rather than just endurance.
- name: Weighted Bench Dip
  form_description: |
    Set up for the Weighted Bench Dip with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
