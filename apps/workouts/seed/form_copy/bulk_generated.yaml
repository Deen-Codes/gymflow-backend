  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Standing Two-Arm Overhead Throw
  form_description: |
    Set up for the Standing Two-Arm Overhead Throw with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Star Jump
  form_description: |
    Set up for the Star Jump with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Step Mill
  form_description: |
    Set up for the Step Mill with the body in a clean working position and the breath ready to settle into rhythm. Work at an effort that matches the session — easy aerobic, threshold, or sprint — rather than starting hot. Keep the form clean through the whole bout; fatigue should slow you down, not break your posture.
  common_mistakes: |
    - Starting too hard and blowing up the second half of the session
    - Letting form break as fatigue sets in
    - Mouth-breathing only — keep some nasal work in for aerobic sets
    - Skipping the cool-down and stacking cardiovascular stress
  breathing_cues: |
    Breathe in rhythm with the work — nasal where you can, mouth-and-nose at higher efforts.
  primary_benefit: |
    Builds cardiovascular base — useful for recovery between heavy sessions and for long-term work capacity.
- name: Step-up with Knee Raise
  form_description: |
    Set up for the Step-up with Knee Raise with the upper back braced, hips loaded, and feet planted shoulder-width. Drive the hips up by squeezing the glutes — the upper back stays in contact with the pad or floor through the rep. Pause for a beat at the top, then lower under control. Don't extend the lower back to chase more range.
  common_mistakes: |
    - Hyperextending the lower back at the top instead of driving from the glutes
    - Pushing through the toes instead of mid-foot
    - Cutting the top contraction short
    - Letting the knees cave inward on the drive up
  breathing_cues: |
    Inhale at the bottom, exhale as you drive the hips up.
  primary_benefit: |
    Loads the glutes at peak contraction — the most efficient hip-hinge variant for building glute size.
- name: Stiff Leg Barbell Good Morning
  form_description: |
    Set up for the Stiff Leg Barbell Good Morning with a flat back and the spine kept neutral throughout. Hinge or extend at the hips by driving from the glutes and lower back together. Stop at neutral spine alignment — going past straight under load stresses the lumbar joints without adding muscle work.
  common_mistakes: |
    - Hyperextending past straight at the top
    - Rounding the lower back to chase range
    - Using momentum on the way up
    - Loading so heavy form breaks before the set ends
  breathing_cues: |
    Inhale on the descent, exhale on the way up.
  primary_benefit: |
    Loads the spinal erectors and posterior chain together — builds the lower back endurance that heavy compounds demand.
- name: Stiff-Legged Dumbbell Deadlift
  form_description: |
    Set up for the Stiff-Legged Dumbbell Deadlift with the feet hip-width, knees softly bent, and the bar or weight close to the body. Lower by sliding the hips back and feeling the hamstrings load — the knees stay soft, not breaking forward. Drive the hips forward to stand tall, squeezing the glutes at the top without leaning back.
  common_mistakes: |
    - Rounding the lower back to chase range
    - Bending the knees through the lift — turns it into a squat
    - Going so heavy the hamstrings can't control the lower
    - Hyperextending the lower back at lockout
  breathing_cues: |
    Big breath at the top, brace through the hinge, exhale on the way up.
  primary_benefit: |
    Loads the hamstrings under deep stretch — the highest-output way to build hamstring size and posterior-chain strength.
- name: Stomach Vacuum
  form_description: |
    Ease into the Stomach Vacuum slowly, letting the tissue lengthen rather than forcing the range. Find the position where you feel a clear stretch in the target muscle and hold with steady breathing. Back off the moment a sharp sensation appears — the goal is mobility, not a fight with the joint.
  common_mistakes: |
    - Bouncing in and out of the stretch
    - Forcing past sharp pain
    - Holding the breath under tension
    - Letting the body twist sideways and dumping the stretch
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the target tissue — useful warm-up to clear a range or cool-down between heavy sessions.
- name: Straight Bar Bench Mid Rows
  form_description: |
    Set up for the Straight Bar Bench Mid Rows with the chest up, shoulder blades pulled down, and arms fully extended. Pull by driving the elbows back, leading with the elbow rather than yanking with the hands. Squeeze the mid-back at the top of the pull, then return under control to a full stretch.
  common_mistakes: |
    - Pulling with the biceps instead of the back
    - Shrugging the shoulders up at the top instead of squeezing back
    - Cutting the bottom range short and missing the stretch
    - Using body english to throw the weight up
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Loads the back through a complete pulling arc — grows both width and thickness in one lift.
- name: Straight Raises on Incline Bench
  form_description: |
    Stand or sit with the weights at the sides, elbows softly bent. Raise the arms out in a smooth arc, leading with the elbows, until the upper arms reach parallel with the floor. Stop there — going higher recruits the traps. Lower slowly; the lengthening phase is where the side delts grow.
  common_mistakes: |
    - Swinging the weights up with momentum
    - Going past parallel and shrugging the traps in
    - Locking the elbows straight under load
    - Rotating the wrists down (pour-the-jug) — shifts work off the side delt
  breathing_cues: |
    Inhale at the bottom, exhale as you raise the arms.
  primary_benefit: |
    Direct loading for the side delts — builds shoulder width that pressing alone underdose.
- name: Straight-Arm Dumbbell Pullover
  form_description: |
    Take the Straight-Arm Dumbbell Pullover starting position with the wrists stacked over the elbows and the chest up. Lower the weight under control to the chest with the elbows tucked at roughly 45° to the body. Drive the weight back up by squeezing the chest, stopping just short of a hard lockout.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Loads the chest, front delts and triceps together — the highest-output upper-body pressing pattern.
- name: Straight-Arm Pulldown
  form_description: |
    Set up for the Straight-Arm Pulldown with the thigh pad snug, arms fully extended overhead, and the shoulder blades pulled down out of the shrug. Pull by driving the elbows down towards the ribs, feeling the lats engage before the arms take over. Squeeze at the bottom of the pull, then return under control to a full overhead stretch.
  common_mistakes: |
    - Pulling the bar behind the neck — rotator cuff stress
    - Leaning back hard and turning it into a row
    - Yanking with the biceps instead of leading with the lats
    - Cutting the top stretch short between reps
  breathing_cues: |
    Inhale at the top, exhale as you pull down.
  primary_benefit: |
    Loads the lats through a long overhead stretch — the most efficient way to add back width.
- name: Stride Jump Crossover
  form_description: |
    Set up for the Stride Jump Crossover with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Sumo Deadlift with Bands
  form_description: |
    Set up for the Sumo Deadlift with Bands with the bar racked or loaded for the strongest line of pull. Brace hard through the trunk and move the bar in a controlled, straight path. Lock out fully at the top of the lift without overextending the spine, then reset between reps.
  common_mistakes: |
    - Losing the brace mid-rep and dumping the load into the lower back
    - Letting the bar drift off the strongest line of pull
    - Going too heavy and grinding through breaking form
    - Skipping the reset between reps and accumulating sloppy reps
  breathing_cues: |
    Big breath at the start, hold through the lift, exhale at lockout.
  primary_benefit: |
    Builds maximum strength in the competition pattern — useful for serious lifters peaking for a meet.
- name: Sumo Deadlift with Chains
