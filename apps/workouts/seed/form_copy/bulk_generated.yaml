- name: Kneeling Cable Crunch With Alternating Oblique Twists
  form_description: |
    Get into the Kneeling Cable Crunch With Alternating Oblique Twists starting position with the ribs stacked over the hips and the lower back pressed lightly into the floor or pad. Crunch the ribs down towards the pelvis using the abs — the lower back stays planted, not arched. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    A direct ab loader that scales with tempo — slow the eccentric and the muscle does more work per rep.
- name: Kneeling Cable Triceps Extension
  form_description: |
    Set up for the Kneeling Cable Triceps Extension with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Kneeling Forearm Stretch
  form_description: |
    Ease into the Kneeling Forearm Stretch slowly, letting the tissue lengthen rather than forcing the range. Find the position where you feel a clear stretch in the target muscle and hold with steady breathing. Back off the moment a sharp sensation appears — the goal is mobility, not a fight with the joint.
  common_mistakes: |
    - Bouncing in and out of the stretch
    - Forcing past sharp pain
    - Holding the breath under tension
    - Letting the body twist sideways and dumping the stretch
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the target tissue — useful warm-up to clear a range or cool-down between heavy sessions.
- name: Kneeling High Pulley Row
  form_description: |
    Set up for the Kneeling High Pulley Row with the thigh pad snug, arms fully extended overhead, and the shoulder blades pulled down out of the shrug. Pull by driving the elbows down towards the ribs, feeling the lats engage before the arms take over. Squeeze at the bottom of the pull, then return under control to a full overhead stretch.
  common_mistakes: |
    - Pulling the bar behind the neck — rotator cuff stress
    - Leaning back hard and turning it into a row
    - Yanking with the biceps instead of leading with the lats
    - Cutting the top stretch short between reps
  breathing_cues: |
    Inhale at the top, exhale as you pull down.
  primary_benefit: |
    Loads the lats through a long overhead stretch — the most efficient way to add back width.
- name: Kneeling Hip Flexor
  form_description: |
    Take the Kneeling Hip Flexor position slowly, easing into the stretch rather than forcing it. Once you feel a clear tension through the front of the thigh, hold the position with steady breathing. Stop short of any sharp pain — the goal is lengthened tissue, not a fight with the joint.
  common_mistakes: |
    - Forcing the stretch past pain instead of easing in
    - Holding the breath under tension
    - Letting the hips tilt to one side and dumping the stretch
    - Bouncing in and out instead of holding a steady position
  breathing_cues: |
    Breathe slowly and steadily — exhale into the deeper part of each hold.
  primary_benefit: |
    Lengthens the quad and hip flexor — useful warm-up or cool-down work for lifters who squat heavy.
- name: Kneeling Jump Squat
  form_description: |
    Set up for the Kneeling Jump Squat with the bar over mid-foot, hip-width stance, and a flat back. Move the bar in a vertical line, staying tight through the upper back and finishing the lift with full hip and knee extension. Catch in a stable position with the bar racked or overhead, then reset before the next rep.
  common_mistakes: |
    - Letting the bar drift away from the body off the floor
    - Cutting the hip extension short before the pull finishes
    - Catching with the knees collapsed inward
    - Going too heavy before the technique is clean
  breathing_cues: |
    Big breath at the bottom, brace through the lift, exhale at the top.
  primary_benefit: |
    Trains full-body coordination under load — the highest-output lift for athletic power, but only useful with clean technique.
- name: Kneeling Single-Arm High Pulley Row
  form_description: |
    Set up for the Kneeling Single-Arm High Pulley Row with the thigh pad snug, arms fully extended overhead, and the shoulder blades pulled down out of the shrug. Pull by driving the elbows down towards the ribs, feeling the lats engage before the arms take over. Squeeze at the bottom of the pull, then return under control to a full overhead stretch.
  common_mistakes: |
    - Pulling the bar behind the neck — rotator cuff stress
    - Leaning back hard and turning it into a row
    - Yanking with the biceps instead of leading with the lats
    - Cutting the top stretch short between reps
  breathing_cues: |
    Inhale at the top, exhale as you pull down.
  primary_benefit: |
    Loads the lats through a long overhead stretch — the most efficient way to add back width.
- name: Kneeling Squat
  form_description: |
    Set up for the Kneeling Squat with the bar racked or loaded for the strongest line of pull. Brace hard through the trunk and move the bar in a controlled, straight path. Lock out fully at the top of the lift without overextending the spine, then reset between reps.
  common_mistakes: |
    - Losing the brace mid-rep and dumping the load into the lower back
    - Letting the bar drift off the strongest line of pull
    - Going too heavy and grinding through breaking form
    - Skipping the reset between reps and accumulating sloppy reps
  breathing_cues: |
    Big breath at the start, hold through the lift, exhale at lockout.
  primary_benefit: |
    Builds maximum strength in the competition pattern — useful for serious lifters peaking for a meet.
