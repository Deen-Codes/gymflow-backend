    Take the Intermediate Hip Flexor and Quad Stretch position slowly, easing into the stretch rather than forcing it. Once you feel a clear tension through the front of the thigh, hold the position with steady breathing. Stop short of any sharp pain — the goal is lengthened tissue, not a fight with the joint.
  common_mistakes: |
    - Forcing the stretch past pain instead of easing in
    - Holding the breath under tension
    - Letting the hips tilt to one side and dumping the stretch
    - Bouncing in and out instead of holding a steady position
  breathing_cues: |
    Breathe slowly and steadily — exhale into the deeper part of each hold.
  primary_benefit: |
    Lengthens the quad and hip flexor — useful warm-up or cool-down work for lifters who squat heavy.
- name: Internal Rotation with Band
  form_description: |
    Stand or sit with the weights at the sides, elbows softly bent. Raise the arms out in a smooth arc, leading with the elbows, until the upper arms reach parallel with the floor. Stop there — going higher recruits the traps. Lower slowly; the lengthening phase is where the side delts grow.
  common_mistakes: |
    - Swinging the weights up with momentum
    - Going past parallel and shrugging the traps in
    - Locking the elbows straight under load
    - Rotating the wrists down (pour-the-jug) — shifts work off the side delt
  breathing_cues: |
    Inhale at the bottom, exhale as you raise the arms.
  primary_benefit: |
    Direct loading for the side delts — builds shoulder width that pressing alone underdose.
- name: Inverted Row with Straps
  form_description: |
    Set up for the Inverted Row with Straps with the chest up, shoulder blades pulled down, and arms fully extended. Drive the elbows down and back, feeling the lats engage before the biceps take over. Pause briefly at the contraction, then lower slowly so the back eccentric-loads.
  common_mistakes: |
    - Pulling with the biceps instead of the back
    - Shrugging the shoulders up at the top instead of squeezing back
    - Cutting the bottom range short and missing the stretch
    - Using body english to throw the weight up
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Loads the back through a complete pulling arc — grows both width and thickness in one lift.
- name: Iron Cross
  form_description: |
    Set up for the Iron Cross sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: Iron Crosses (stretch)
  form_description: |
