    - Locking the elbows straight under load
    - Rotating the wrists down (pour-the-jug) — shifts work off the side delt
  breathing_cues: |
    Inhale at the bottom, exhale as you raise the arms.
  primary_benefit: |
    Direct loading for the side delts — builds shoulder width that pressing alone underdose.
- name: Carioca Quick Step
  form_description: |
    Set up for the Carioca Quick Step with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Cat Stretch
  form_description: |
    Ease into the Cat Stretch slowly, letting the lower back lengthen rather than forcing the position. Find the spot where you feel a clear stretch through the spine and hold it with steady breathing. Stop short of sharp pain — the lumbar spine doesn't want to be forced under tension.
  common_mistakes: |
    - Forcing past sharp pain in the lower back
    - Holding the breath under tension
    - Bouncing in and out instead of holding a steady position
    - Letting the hips tilt to one side mid-stretch
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Lengthens the lower-back muscles — useful recovery work between heavy hinge or squat sessions.
- name: Catch and Overhead Throw
  form_description: |
    Set up for the Catch and Overhead Throw with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
