- name: Balance Board
  form_description: |
    Set up for the Balance Board with the balls of the feet on a raised platform or step and the heels free to drop below. Drop the heels for a full stretch at the bottom, then drive up onto the toes and squeeze the calves hard at the top. The slow lengthening phase matters most — three seconds down beats a fast bounce.
  common_mistakes: |
    - Bouncing reps for tendon spring instead of calf work
    - Cutting the bottom stretch short
    - Letting the knees drift inward through the rep
    - Going through the motion without pausing at the top contraction
  breathing_cues: |
    Inhale on the descent, exhale at the top squeeze.
  primary_benefit: |
    Direct calf loading through a long range — the workhorse for lower-leg size.
- name: Ball Leg Curl
  form_description: |
    Get into the Ball Leg Curl position with the hips planted and the lower legs free to move through the full curl. Drive the heels back by squeezing the hamstrings — keep the rest of the body still. Pause at the top of the curl, then lower under control to near-full extension.
  common_mistakes: |
    - Lifting the hips off the bench to gain range
    - Banging the stack at the bottom (no controlled eccentric)
    - Half-repping — the top contraction is where it matters
    - Pad placed too far up the calf, working the achilles instead
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Isolates the hamstrings at the knee — grows the lower hamstring belly that hip-hinge work alone leaves behind.
- name: Band Assisted Pull-Up
  form_description: |
    Set up for the Band Assisted Pull-Up with the thigh pad snug, arms fully extended overhead, and the shoulder blades pulled down out of the shrug. Pull by driving the elbows down towards the ribs, feeling the lats engage before the arms take over. Squeeze at the bottom of the pull, then return under control to a full overhead stretch.
  common_mistakes: |
    - Pulling the bar behind the neck — rotator cuff stress
    - Leaning back hard and turning it into a row
    - Yanking with the biceps instead of leading with the lats
    - Cutting the top stretch short between reps
  breathing_cues: |
    Inhale at the top, exhale as you pull down.
  primary_benefit: |
    Loads the lats through a long overhead stretch — the most efficient way to add back width.
- name: Band Good Morning
  form_description: |
    Set up for the Band Good Morning with the bar racked or loaded for the strongest line of pull. Brace hard through the trunk and move the bar in a controlled, straight path. Lock out fully at the top of the lift without overextending the spine, then reset between reps.
  common_mistakes: |
    - Losing the brace mid-rep and dumping the load into the lower back
    - Letting the bar drift off the strongest line of pull
    - Going too heavy and grinding through breaking form
    - Skipping the reset between reps and accumulating sloppy reps
  breathing_cues: |
    Big breath at the start, hold through the lift, exhale at lockout.
  primary_benefit: |
    Builds maximum strength in the competition pattern — useful for serious lifters peaking for a meet.
