- name: 3/4 Sit-Up
  form_description: |
    Take the start position with the head neutral and the chin off the chest — don't pull on the neck to fold up. Crunch the ribs down towards the pelvis using the abs — the lower back stays planted, not arched. Hold the top position for a count, then return slowly so the abs eccentric-load on the way down.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Trains the abs under steady tension — the kind of work that builds ab thickness rather than just endurance.
- name: 90/90 Hamstring
  form_description: |
    Ease into the 90/90 Hamstring slowly, letting the hamstrings lengthen rather than forcing the range. Find the position where you feel a clear stretch behind the thigh and hold it with steady breathing. Back off the moment a sharp sensation appears — that's the joint, not the muscle.
  common_mistakes: |
    - Bouncing in and out instead of holding a steady position
    - Rounding the lower back to chase more range
    - Holding the breath under tension
    - Forcing past pain instead of easing in
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the hamstrings — useful warm-up or recovery work between heavy hinge sessions.
- name: Ab Crunch Machine
  form_description: |
    Set up for the Ab Crunch Machine with the spine neutral and the lower back kept flat — no arching, no lifting the hips. Drive the ribcage towards the hips by shortening the abs, not by hinging at the hips. Hold the top position for a count, then return slowly so the abs eccentric-load on the way down.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Loads the abs through a controlled spinal flexion — useful for adding direct ab volume that crunches alone underdose.
- name: Ab Roller
  form_description: |
    Get into the Ab Roller starting position with the ribs stacked over the hips and the lower back pressed lightly into the floor or pad. Crunch the ribs down towards the pelvis using the abs — the lower back stays planted, not arched. Hold the top position for a count, then return slowly so the abs eccentric-load on the way down.
