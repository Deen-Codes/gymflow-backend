- name: Atlas Stone Trainer
  form_description: |
    Set up for the Atlas Stone Trainer with the implement racked or gripped in the strongest position. Move the load through its full path under steady control — the implement is heavy and form is what keeps the joints intact. Finish the rep or carry in a stable position before resetting for the next attempt.
  common_mistakes: |
    - Letting the lower back round under heavy load
    - Going past clean form to add reps or distance
    - Skipping warm-up sets and going straight to heavy
    - Holding the breath through the whole rep — brace and breathe in cycles
  breathing_cues: |
    Breathe in cycles — brace for the rep, exhale briefly between reps.
  primary_benefit: |
    Builds whole-body strength under awkward load — the kind of work that translates to real-world lifting.
