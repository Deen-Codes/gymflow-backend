    Set up for the Shotgun Row with the thigh pad snug, arms fully extended overhead, and the shoulder blades pulled down out of the shrug. Pull by driving the elbows down towards the ribs, feeling the lats engage before the arms take over. Squeeze at the bottom of the pull, then return under control to a full overhead stretch.
  common_mistakes: |
    - Pulling the bar behind the neck — rotator cuff stress
    - Leaning back hard and turning it into a row
    - Yanking with the biceps instead of leading with the lats
    - Cutting the top stretch short between reps
  breathing_cues: |
    Inhale at the top, exhale as you pull down.
  primary_benefit: |
    Loads the lats through a long overhead stretch — the most efficient way to add back width.
- name: Shoulder Circles
  form_description: |
    Ease into the Shoulder Circles slowly, letting the shoulder lengthen rather than forcing the range. Find the position where you feel a clear stretch through the joint and hold it with steady breathing. Back off if you feel sharp pain — the goal is mobility, not pinching the joint.
  common_mistakes: |
    - Forcing past sharp pain instead of easing in
    - Holding the breath under tension
    - Letting the shoulder shrug up into the stretch
    - Rushing the position before the tissue is warm
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Opens the shoulder girdle — useful pre-workout to clear the overhead range or post-workout for recovery.
- name: Shoulder Press - With Bands
  form_description: |
    Set up for the Shoulder Press - With Bands sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
