- name: Lateral Raise - With Bands
  form_description: |
    Stand or sit with the weights at the sides, elbows softly bent. Raise the arms out in a smooth arc, leading with the elbows, until the upper arms reach parallel with the floor. Stop there — going higher recruits the traps. Lower slowly; the lengthening phase is where the side delts grow.
  common_mistakes: |
    - Swinging the weights up with momentum
    - Going past parallel and shrugging the traps in
    - Locking the elbows straight under load
    - Rotating the wrists down (pour-the-jug) — shifts work off the side delt
  breathing_cues: |
    Inhale at the bottom, exhale as you raise the arms.
  primary_benefit: |
    Direct loading for the side delts — builds shoulder width that pressing alone underdose.
- name: Latissimus Dorsi-SMR
  form_description: |
    Ease into the Latissimus Dorsi-SMR slowly, letting the tissue lengthen rather than forcing the range. Find the position where you feel a clear stretch in the target muscle and hold with steady breathing. Back off the moment a sharp sensation appears — the goal is mobility, not a fight with the joint.
  common_mistakes: |
    - Bouncing in and out of the stretch
    - Forcing past sharp pain
    - Holding the breath under tension
    - Letting the body twist sideways and dumping the stretch
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the target tissue — useful warm-up to clear a range or cool-down between heavy sessions.
- name: Leg Extensions
  form_description: |
    Get into the Leg Extensions position with the hips planted and the working leg ready to extend through a full range. Drive the foot up by squeezing the quad — let the rest of the body stay still. Return slowly so the quad takes the load on the way down — that's where most of the growth lives.
  common_mistakes: |
    - Slamming into full extension and stressing the knee
    - Lifting the hips off the seat for leverage
    - Half-repping — not fully contracting at the top
    - Rushing the lower and missing the eccentric
  breathing_cues: |
    Inhale at the bottom, exhale as you extend.
  primary_benefit: |
    Direct quad loading at full extension — fills out the front of the thigh in a way compounds alone underdose.
- name: Leg Lift
  form_description: |
    Set up for the Leg Lift with the spine neutral and the working leg ready to move through its full range. Drive the working leg back or up by contracting the glute, not by arching the lower back. Squeeze at the top of the range, then lower under control to the start position.
  common_mistakes: |
    - Arching the lower back instead of contracting the glute
    - Swinging the leg with momentum
    - Cutting the top squeeze short
    - Going so heavy form breaks before the muscle works
  breathing_cues: |
    Inhale at the start, exhale as you drive the leg back.
  primary_benefit: |
    Directly loads the glute through hip extension — useful for adding glute volume without taxing the lower back.
- name: Leg Pull-In
  form_description: |
    Get into the Leg Pull-In starting position with the ribs stacked over the hips and the lower back pressed lightly into the floor or pad. Drive the ribcage towards the hips by shortening the abs, not by hinging at the hips. Hold the top position for a count, then return slowly so the abs eccentric-load on the way down.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Trains the abs under steady tension — the kind of work that builds ab thickness rather than just endurance.
- name: Leg-Over Floor Press
  form_description: |
    Take the Leg-Over Floor Press starting position with the wrists stacked over the elbows and the chest up. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Press up in a straight line over the shoulders, squeezing the chest at the top without rolling the shoulders forward.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Loads the chest, front delts and triceps together — the highest-output upper-body pressing pattern.
- name: Leg-Up Hamstring Stretch
  form_description: |
    Ease into the Leg-Up Hamstring Stretch slowly, letting the hamstrings lengthen rather than forcing the range. Find the position where you feel a clear stretch behind the thigh and hold it with steady breathing. Back off the moment a sharp sensation appears — that's the joint, not the muscle.
  common_mistakes: |
    - Bouncing in and out instead of holding a steady position
    - Rounding the lower back to chase more range
    - Holding the breath under tension
    - Forcing past pain instead of easing in
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the hamstrings — useful warm-up or recovery work between heavy hinge sessions.
- name: Leverage Chest Press
  form_description: |
    Take the Leverage Chest Press starting position with the wrists stacked over the elbows and the chest up. Lower the weight under control to the chest with the elbows tucked at roughly 45° to the body. Drive the weight back up by squeezing the chest, stopping just short of a hard lockout.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Loads the chest, front delts and triceps together — the highest-output upper-body pressing pattern.
- name: Leverage Deadlift
  form_description: |
    Get into the Leverage Deadlift with the chest tall and the upper back braced before the descent. Bend the knees and hips together to lower into the bottom — let the chest stay up rather than tipping forward. Drive up through mid-foot to stand, stopping just short of locking out at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Trains the squat pattern under load — the workhorse for building lower-body size and power.
- name: Leverage Decline Chest Press
  form_description: |
    Take the Leverage Decline Chest Press starting position with the wrists stacked over the elbows and the chest up. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Press up in a straight line over the shoulders, squeezing the chest at the top without rolling the shoulders forward.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the chest under heavy load through a long range — the foundational pressing lift for size and strength.
- name: Leverage High Row
  form_description: |
    Set up for the Leverage High Row with the chest up, shoulder blades pulled down, and arms fully extended. Pull by driving the elbows back, leading with the elbow rather than yanking with the hands. Pause briefly at the contraction, then lower slowly so the back eccentric-loads.
  common_mistakes: |
    - Pulling with the biceps instead of the back
    - Shrugging the shoulders up at the top instead of squeezing back
    - Cutting the bottom range short and missing the stretch
    - Using body english to throw the weight up
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Loads the back through a complete pulling arc — grows both width and thickness in one lift.
- name: Leverage Incline Chest Press
  form_description: |
    Set up for the Leverage Incline Chest Press with the shoulder blades pinned back and down, feet planted firmly. Lower the weight under control to the chest with the elbows tucked at roughly 45° to the body. Press up in a straight line over the shoulders, squeezing the chest at the top without rolling the shoulders forward.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the chest under heavy load through a long range — the foundational pressing lift for size and strength.
- name: Leverage Iso Row
  form_description: |
    Set up for the Leverage Iso Row with the thigh pad snug, arms fully extended overhead, and the shoulder blades pulled down out of the shrug. Pull by driving the elbows down towards the ribs, feeling the lats engage before the arms take over. Squeeze at the bottom of the pull, then return under control to a full overhead stretch.
  common_mistakes: |
    - Pulling the bar behind the neck — rotator cuff stress
    - Leaning back hard and turning it into a row
    - Yanking with the biceps instead of leading with the lats
    - Cutting the top stretch short between reps
  breathing_cues: |
    Inhale at the top, exhale as you pull down.
  primary_benefit: |
    Loads the lats through a long overhead stretch — the most efficient way to add back width.
- name: Leverage Shoulder Press
  form_description: |
    Set up for the Leverage Shoulder Press sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: Leverage Shrug
  form_description: |
    Stand tall with the weight at arm's length, arms straight, shoulders relaxed at the start. Shrug the shoulders straight up towards the ears as high as they will go. Pause at the top, then lower under control to a full stretch without rolling the shoulders forward.
  common_mistakes: |
    - Rolling the shoulders forward through the rep
    - Bending the elbows to fold the weight up
    - Cutting the top range short
    - Using so much weight the bar barely moves
  breathing_cues: |
    Exhale as you shrug up, inhale as you lower.
  primary_benefit: |
    Direct loading for the upper traps — fills out the top of the shoulder line that pulling lifts alone often miss.
- name: Linear 3-Part Start Technique
  form_description: |
    Set up for the Linear 3-Part Start Technique with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Linear Acceleration Wall Drill
  form_description: |
    Set up for the Linear Acceleration Wall Drill with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Linear Depth Jump
  form_description: |
    Set up for the Linear Depth Jump with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Log Lift
  form_description: |
    Set up for the Log Lift with the implement racked or gripped in the strongest position. Move the load through its full path under steady control — the implement is heavy and form is what keeps the joints intact. Finish the rep or carry in a stable position before resetting for the next attempt.
  common_mistakes: |
    - Letting the lower back round under heavy load
    - Going past clean form to add reps or distance
    - Skipping warm-up sets and going straight to heavy
    - Holding the breath through the whole rep — brace and breathe in cycles
  breathing_cues: |
    Breathe in cycles — brace for the rep, exhale briefly between reps.
  primary_benefit: |
    Builds whole-body strength under awkward load — the kind of work that translates to real-world lifting.
- name: London Bridges
  form_description: |
    Set up for the London Bridges with the thigh pad snug, arms fully extended overhead, and the shoulder blades pulled down out of the shrug. Pull by driving the elbows down towards the ribs, feeling the lats engage before the arms take over. Squeeze at the bottom of the pull, then return under control to a full overhead stretch.
  common_mistakes: |
    - Pulling the bar behind the neck — rotator cuff stress
    - Leaning back hard and turning it into a row
    - Yanking with the biceps instead of leading with the lats
    - Cutting the top stretch short between reps
  breathing_cues: |
    Inhale at the top, exhale as you pull down.
  primary_benefit: |
    Loads the lats through a long overhead stretch — the most efficient way to add back width.
- name: Looking At Ceiling
  form_description: |
    Take the Looking At Ceiling position slowly, easing into the stretch rather than forcing it. Once you feel a clear tension through the front of the thigh, hold the position with steady breathing. Stop short of any sharp pain — the goal is lengthened tissue, not a fight with the joint.
  common_mistakes: |
    - Forcing the stretch past pain instead of easing in
    - Holding the breath under tension
    - Letting the hips tilt to one side and dumping the stretch
    - Bouncing in and out instead of holding a steady position
  breathing_cues: |
    Breathe slowly and steadily — exhale into the deeper part of each hold.
  primary_benefit: |
    Lengthens the quad and hip flexor — useful warm-up or cool-down work for lifters who squat heavy.
- name: Low Cable Crossover
  form_description: |
    Set up for the Low Cable Crossover with a soft bend in the elbows — not locked straight, not deeply bent. Open the arms out wide in a smooth arc, letting the chest stretch but not the shoulder joint. Drive the hands together using the chest, not the arms, and squeeze for a beat at the midpoint.
  common_mistakes: |
    - Bending the elbows mid-rep to turn it into a press
    - Letting the hands fly open at the bottom and yank the shoulder
    - Shrugging the shoulders up to assist the squeeze
    - Cutting the bottom range short and missing the chest stretch
  breathing_cues: |
    Inhale as the arms open, exhale as you squeeze them together.
  primary_benefit: |
    Isolates the chest under direct tension — grows the inner pec line without overloading the shoulder.
- name: Low Cable Triceps Extension
  form_description: |
    Set up for the Low Cable Triceps Extension with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Low Pulley Row To Neck
  form_description: |
    Set up for the Low Pulley Row To Neck with the bar or weight at shoulder height, ribs braced, feet planted. Drive the weight up by extending through the shoulders, keeping the bar path close to the face. Finish overhead with the head pushed slightly forward so the bar sits over mid-foot. Lower under control to the start position.
  common_mistakes: |
    - Pressing the bar in front of the face instead of overhead
    - Hyperextending the lower back at lockout
    - Letting the elbows flare wide at the bottom
    - Cutting the bottom range short
  breathing_cues: |
    Inhale at the top, brace through the descent, exhale through the press.
  primary_benefit: |
    Builds overhead pressing strength through the shoulder girdle — a full upper-body strength lift, not just a delt builder.
- name: Lower Back Curl
  form_description: |
    Ease into the Lower Back Curl slowly, letting the tissue lengthen rather than forcing the range. Find the position where you feel a clear stretch in the target muscle and hold with steady breathing. Back off the moment a sharp sensation appears — the goal is mobility, not a fight with the joint.
  common_mistakes: |
    - Bouncing in and out of the stretch
    - Forcing past sharp pain
    - Holding the breath under tension
    - Letting the body twist sideways and dumping the stretch
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the target tissue — useful warm-up to clear a range or cool-down between heavy sessions.
- name: Lower Back-SMR
  form_description: |
    Ease into the Lower Back-SMR slowly, letting the lower back lengthen rather than forcing the position. Find the spot where you feel a clear stretch through the spine and hold it with steady breathing. Stop short of sharp pain — the lumbar spine doesn't want to be forced under tension.
  common_mistakes: |
    - Forcing past sharp pain in the lower back
    - Holding the breath under tension
    - Bouncing in and out instead of holding a steady position
    - Letting the hips tilt to one side mid-stretch
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Lengthens the lower-back muscles — useful recovery work between heavy hinge or squat sessions.
- name: Lunge Pass Through
  form_description: |
    Take the Lunge Pass Through stance with a flat back and the chest up before the hinge begins. Lower by sliding the hips back and feeling the hamstrings load — the knees stay soft, not breaking forward. Reverse the hinge by pushing the hips through, finishing upright without overextending the lower back.
  common_mistakes: |
    - Rounding the lower back to chase range
    - Bending the knees through the lift — turns it into a squat
    - Going so heavy the hamstrings can't control the lower
    - Hyperextending the lower back at lockout
  breathing_cues: |
    Big breath at the top, brace through the hinge, exhale on the way up.
  primary_benefit: |
    Loads the hamstrings under deep stretch — the highest-output way to build hamstring size and posterior-chain strength.
- name: Lunge Sprint
  form_description: |
    Get into the Lunge Sprint with the chest tall and the upper back braced before the descent. Lower under control by bending the knees and hips together — knees track over the toes the whole way. Reverse the descent by driving through the heels and mid-foot until you reach the top position.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Trains the squat pattern under load — the workhorse for building lower-body size and power.
- name: Lying Bent Leg Groin
  form_description: |
    Ease into the Lying Bent Leg Groin slowly, letting the inner thigh lengthen rather than forcing the range. Find the position where you feel a clear stretch through the adductors and hold with steady breathing. Stop short of sharp pain — the joint is delicate at end range.
  common_mistakes: |
    - Forcing past sharp pain instead of easing in
    - Bouncing in and out of the stretch
    - Letting the hips collapse and dumping the stretch
    - Holding the breath under tension
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Opens the inner thigh and groin — useful warm-up before squats or wide-stance work.
- name: Lying Cable Curl
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Builds the biceps in a strict pulling line — the bread-and-butter arm lift across every programme.
- name: Lying Cambered Barbell Row
  form_description: |
    Get into the Lying Cambered Barbell Row position with the spine neutral and the working arm under steady control. Pull through the elbow line, keeping the wrist neutral and the lat firing first. Squeeze the contraction briefly, then return slowly to a full stretch.
  common_mistakes: |
    - Letting the biceps take over the pull
    - Twisting the torso to gain range
    - Shrugging the shoulder up at the top of the rep
    - Cutting the bottom stretch short
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Isolates the back fibres without the systemic load of a compound row — useful for adding back volume late in a session.
- name: Lying Close-Grip Bar Curl On High Pulley
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Loads the biceps directly — a clean way to add arm volume without leaning on compound pulls.
- name: Lying Close-Grip Barbell Triceps Extension Behind The Head
  form_description: |
    Set up for the Lying Close-Grip Barbell Triceps Extension Behind The Head with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Lying Close-Grip Barbell Triceps Press To Chin
  form_description: |
    Set up for the Lying Close-Grip Barbell Triceps Press To Chin with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Lying Crossover
  form_description: |
    Ease into the Lying Crossover slowly, letting the outer hip lengthen rather than forcing the position. Hold the position where you feel a clear stretch through the side of the hip with steady breathing. Back off the moment a sharp sensation appears.
  common_mistakes: |
    - Forcing past pain instead of easing in
    - Holding the breath under tension
    - Letting the hip drop and dumping the stretch
    - Rushing in and out of the position
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Opens the outer hip — useful warm-up for lifters who run or squat heavy.
- name: Lying Dumbbell Tricep Extension
  form_description: |
    Set up for the Lying Dumbbell Tricep Extension with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Lying Face Down Plate Neck Resistance
  form_description: |
    Set up for the Lying Face Down Plate Neck Resistance with the spine neutral and the head moving through a small, controlled range. Move slowly — neck training rewards control over weight. Pause briefly at the end of each range, then return to the start position without losing tension.
  common_mistakes: |
    - Going too heavy and jerking the neck through reps
    - Cutting the range short to chase weight
    - Pulling the head with the hands instead of the neck muscles
    - Holding the breath under tension
  breathing_cues: |
    Breathe steadily through each rep.
  primary_benefit: |
    Strengthens the neck musculature — useful for contact-sport lifters and as insurance against poor desk posture.
- name: Lying Face Up Plate Neck Resistance
  form_description: |
    Set up for the Lying Face Up Plate Neck Resistance with the spine neutral and the head moving through a small, controlled range. Move slowly — neck training rewards control over weight. Pause briefly at the end of each range, then return to the start position without losing tension.
  common_mistakes: |
    - Going too heavy and jerking the neck through reps
    - Cutting the range short to chase weight
    - Pulling the head with the hands instead of the neck muscles
    - Holding the breath under tension
  breathing_cues: |
    Breathe steadily through each rep.
  primary_benefit: |
    Strengthens the neck musculature — useful for contact-sport lifters and as insurance against poor desk posture.
- name: Lying Glute
  form_description: |
    Ease into the Lying Glute slowly, letting the glute lengthen rather than forcing the position. Hold the position where you feel a clear stretch through the glute and steady the breath. Stop short of sharp pain — the goal is mobility through the hip, not pinching the joint.
  common_mistakes: |
    - Forcing the stretch past pain
    - Holding the breath under tension
    - Letting the hip rotate out and dumping the stretch
    - Rushing in and out of the position
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Opens the glute and external rotators of the hip — useful warm-up before squats or hinges.
- name: Lying Hamstring
  form_description: |
    Ease into the Lying Hamstring slowly, letting the hamstrings lengthen rather than forcing the range. Find the position where you feel a clear stretch behind the thigh and hold it with steady breathing. Back off the moment a sharp sensation appears — that's the joint, not the muscle.
  common_mistakes: |
    - Bouncing in and out instead of holding a steady position
    - Rounding the lower back to chase more range
    - Holding the breath under tension
    - Forcing past pain instead of easing in
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the hamstrings — useful warm-up or recovery work between heavy hinge sessions.
- name: Lying High Bench Barbell Curl
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Loads the biceps directly — a clean way to add arm volume without leaning on compound pulls.
- name: Lying Leg Curls
  form_description: |
    Set up for the Lying Leg Curls with the pad sitting just above the heels and the knees just past the bench edge. Curl the heels in by contracting the hamstrings, not by jerking the hips up. Pause at the top of the curl, then lower under control to near-full extension.
  common_mistakes: |
    - Lifting the hips off the bench to gain range
    - Banging the stack at the bottom (no controlled eccentric)
    - Half-repping — the top contraction is where it matters
    - Pad placed too far up the calf, working the achilles instead
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Isolates the hamstrings at the knee — grows the lower hamstring belly that hip-hinge work alone leaves behind.
- name: Lying Machine Squat
  form_description: |
    Take the Lying Machine Squat stance with the feet flat and the weight loaded over mid-foot. Bend the knees and hips together to lower into the bottom — let the chest stay up rather than tipping forward. Reverse the descent by driving through the heels and mid-foot until you reach the top position.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Trains the squat pattern under load — the workhorse for building lower-body size and power.
- name: Lying One-Arm Lateral Raise
  form_description: |
    Stand or sit with the weights at the sides, elbows softly bent. Raise the arms out in a smooth arc, leading with the elbows, until the upper arms reach parallel with the floor. Stop there — going higher recruits the traps. Lower slowly; the lengthening phase is where the side delts grow.
  common_mistakes: |
    - Swinging the weights up with momentum
    - Going past parallel and shrugging the traps in
    - Locking the elbows straight under load
    - Rotating the wrists down (pour-the-jug) — shifts work off the side delt
  breathing_cues: |
    Inhale at the bottom, exhale as you raise the arms.
  primary_benefit: |
    Direct loading for the side delts — builds shoulder width that pressing alone underdose.
- name: Lying Prone Quadriceps
  form_description: |
    Take the Lying Prone Quadriceps position slowly, easing into the stretch rather than forcing it. Once you feel a clear tension through the front of the thigh, hold the position with steady breathing. Stop short of any sharp pain — the goal is lengthened tissue, not a fight with the joint.
  common_mistakes: |
    - Forcing the stretch past pain instead of easing in
    - Holding the breath under tension
    - Letting the hips tilt to one side and dumping the stretch
    - Bouncing in and out instead of holding a steady position
  breathing_cues: |
    Breathe slowly and steadily — exhale into the deeper part of each hold.
  primary_benefit: |
    Lengthens the quad and hip flexor — useful warm-up or cool-down work for lifters who squat heavy.
- name: Lying Rear Delt Raise
  form_description: |
    Set up for the Lying Rear Delt Raise with the torso tipped forward and a soft bend in the elbows. Raise the arms out to the sides by driving through the elbows — not by yanking with the hands. Stop when the upper arms are roughly parallel to the floor, squeeze through the rear delts and shoulder blades, then lower under control.
  common_mistakes: |
    - Standing too upright and turning it into a row
    - Using momentum to swing the weights up
    - Lifting with the traps instead of the rear delts
    - Locking the elbows straight under load
  breathing_cues: |
    Exhale as you raise, inhale on the lower.
  primary_benefit: |
    Isolates the rear delts — the cheapest insurance against pressing-heavy shoulder pain.
- name: Lying Supine Dumbbell Curl
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Builds the biceps in a strict pulling line — the bread-and-butter arm lift across every programme.
- name: Lying T-Bar Row
  form_description: |
    Set up for the Lying T-Bar Row with the chest up, shoulder blades pulled down, and arms fully extended. Pull by driving the elbows back, leading with the elbow rather than yanking with the hands. Squeeze the mid-back at the top of the pull, then return under control to a full stretch.
  common_mistakes: |
    - Pulling with the biceps instead of the back
    - Shrugging the shoulders up at the top instead of squeezing back
    - Cutting the bottom range short and missing the stretch
    - Using body english to throw the weight up
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Loads the back through a complete pulling arc — grows both width and thickness in one lift.
- name: Machine Bench Press
  form_description: |
    Take the Machine Bench Press starting position with the wrists stacked over the elbows and the chest up. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Drive the weight back up by squeezing the chest, stopping just short of a hard lockout.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Loads the chest, front delts and triceps together — the highest-output upper-body pressing pattern.
- name: Machine Bicep Curl
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Builds the biceps in a strict pulling line — the bread-and-butter arm lift across every programme.
- name: Machine Shoulder (Military) Press
  form_description: |
    Set up for the Machine Shoulder (Military) Press sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: Machine Triceps Extension
  form_description: |
    Set up for the Machine Triceps Extension with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Medicine Ball Chest Pass
  form_description: |
    Set up for the Medicine Ball Chest Pass with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
