- name: Power Partials
  form_description: |
    Stand or sit with the weights at the sides, elbows softly bent. Raise the arms out in a smooth arc, leading with the elbows, until the upper arms reach parallel with the floor. Stop there — going higher recruits the traps. Lower slowly; the lengthening phase is where the side delts grow.
  common_mistakes: |
    - Swinging the weights up with momentum
    - Going past parallel and shrugging the traps in
    - Locking the elbows straight under load
    - Rotating the wrists down (pour-the-jug) — shifts work off the side delt
  breathing_cues: |
    Inhale at the bottom, exhale as you raise the arms.
  primary_benefit: |
    Direct loading for the side delts — builds shoulder width that pressing alone underdose.
- name: Power Snatch
  form_description: |
    Set up for the Power Snatch with the bar over mid-foot, hip-width stance, and a flat back. Move the bar in a vertical line, staying tight through the upper back and finishing the lift with full hip and knee extension. Catch in a stable position with the bar racked or overhead, then reset before the next rep.
  common_mistakes: |
    - Letting the bar drift away from the body off the floor
    - Cutting the hip extension short before the pull finishes
    - Catching with the knees collapsed inward
    - Going too heavy before the technique is clean
  breathing_cues: |
    Big breath at the bottom, brace through the lift, exhale at the top.
  primary_benefit: |
    Trains full-body coordination under load — the highest-output lift for athletic power, but only useful with clean technique.
- name: Power Snatch from Blocks
  form_description: |
    Set up for the Power Snatch from Blocks with the bar over mid-foot, hip-width stance, and a flat back. Move the bar in a vertical line, staying tight through the upper back and finishing the lift with full hip and knee extension. Catch in a stable position with the bar racked or overhead, then reset before the next rep.
  common_mistakes: |
