- name: Bench Sprint
  form_description: |
    Set up for the Bench Sprint with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Bent Over Barbell Row
  form_description: |
    Set up for the Bent Over Barbell Row with the chest up, shoulder blades pulled down, and arms fully extended. Pull by driving the elbows back, leading with the elbow rather than yanking with the hands. Pause briefly at the contraction, then lower slowly so the back eccentric-loads.
  common_mistakes: |
    - Pulling with the biceps instead of the back
    - Shrugging the shoulders up at the top instead of squeezing back
    - Cutting the bottom range short and missing the stretch
    - Using body english to throw the weight up
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Builds mid-back and lat thickness through a long pulling range — the backbone of any back day.
- name: Bent Over Dumbbell Rear Delt Raise With Head On Bench
  form_description: |
    Set up for the Bent Over Dumbbell Rear Delt Raise With Head On Bench with the torso tipped forward and a soft bend in the elbows. Raise the arms out to the sides by driving through the elbows — not by yanking with the hands. Stop when the upper arms are roughly parallel to the floor, squeeze through the rear delts and shoulder blades, then lower under control.
  common_mistakes: |
    - Standing too upright and turning it into a row
    - Using momentum to swing the weights up
    - Lifting with the traps instead of the rear delts
    - Locking the elbows straight under load
  breathing_cues: |
    Exhale as you raise, inhale on the lower.
  primary_benefit: |
    Isolates the rear delts — the cheapest insurance against pressing-heavy shoulder pain.
- name: Bent Over Low-Pulley Side Lateral
  form_description: |
    Set up for the Bent Over Low-Pulley Side Lateral with the torso tipped forward and a soft bend in the elbows. Raise the arms out to the sides by driving through the elbows — not by yanking with the hands. Stop when the upper arms are roughly parallel to the floor, squeeze through the rear delts and shoulder blades, then lower under control.
  common_mistakes: |
    - Standing too upright and turning it into a row
    - Using momentum to swing the weights up
    - Lifting with the traps instead of the rear delts
    - Locking the elbows straight under load
  breathing_cues: |
    Exhale as you raise, inhale on the lower.
  primary_benefit: |
