- name: Suspended Row
  form_description: |
    Get into the Suspended Row starting position with a flat back and the weight under control before the pull begins. Drive the elbows down and back, feeling the lats engage before the biceps take over. Pause briefly at the contraction, then lower slowly so the back eccentric-loads.
  common_mistakes: |
    - Pulling with the biceps instead of the back
    - Shrugging the shoulders up at the top instead of squeezing back
    - Cutting the bottom range short and missing the stretch
    - Using body english to throw the weight up
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Builds mid-back and lat thickness through a long pulling range — the backbone of any back day.
- name: Suspended Split Squat
  form_description: |
    Set up for the Suspended Split Squat with the feet at hip-to-shoulder width, toes turned out slightly. Descend by sitting between the hips, keeping the torso angle steady and the heels planted. Drive up through mid-foot to stand, stopping just short of locking out at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Trains the squat pattern under load — the workhorse for building lower-body size and power.
- name: Svend Press
