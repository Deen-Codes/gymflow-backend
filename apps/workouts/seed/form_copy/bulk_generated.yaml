- name: Barbell Step Ups
  form_description: |
    Take the Barbell Step Ups stance with the feet flat and the weight loaded over mid-foot. Lower under control by bending the knees and hips together — knees track over the toes the whole way. Reverse the descent by driving through the heels and mid-foot until you reach the top position.
  common_mistakes: |
