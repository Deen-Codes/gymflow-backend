  primary_benefit: |
    Loads the abs through a controlled spinal flexion — useful for adding direct ab volume that crunches alone underdose.
- name: Suspended Push-Up
  form_description: |
    Set up for the Suspended Push-Up with the shoulder blades pinned back and down, feet planted firmly. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Press up in a straight line over the shoulders, squeezing the chest at the top without rolling the shoulders forward.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the chest under heavy load through a long range — the foundational pressing lift for size and strength.
- name: Suspended Reverse Crunch
  form_description: |
    Take the start position with the head neutral and the chin off the chest — don't pull on the neck to fold up. Drive the ribcage towards the hips by shortening the abs, not by hinging at the hips. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
