- name: Thigh Abductor
  form_description: |
    Sit with the pads pressed against the outer thighs and the hips at a comfortable angle. Drive the legs out by squeezing through the glute medius and outer hip. Pause briefly at the outer position, then return under control.
  common_mistakes: |
    - Leaning back to add range with momentum
    - Letting the pads slam shut at the bottom
    - Going so heavy the lower back takes over
    - Cutting the contraction short at the top
  breathing_cues: |
    Inhale at the bottom, exhale as you press the legs out.
  primary_benefit: |
    Direct loading for the glute medius — useful for hip stability and that side-of-the-hip shape compounds miss.
- name: Thigh Adductor
  form_description: |
    Sit or stand with the pads pressed against the inner thighs, hips at a comfortable angle. Squeeze the legs together by driving from the inner thighs, pausing briefly at the middle. Open back up under control — the slow lengthening phase is most of the work here.
  common_mistakes: |
    - Slamming the pads together with momentum
    - Letting the pads fly open at the bottom and yank the joint
    - Sitting hunched forward and shifting work to the back
    - Going so heavy hip flexors take over
  breathing_cues: |
    Inhale as the legs open, exhale as you squeeze them together.
  primary_benefit: |
    Builds the inner thigh — the only direct loader of a muscle group most squat-and-deadlift programmes neglect.
- name: Tire Flip
  form_description: |
    Set up for the Tire Flip with the implement racked or gripped in the strongest position. Move the load through its full path under steady control — the implement is heavy and form is what keeps the joints intact. Finish the rep or carry in a stable position before resetting for the next attempt.
  common_mistakes: |
    - Letting the lower back round under heavy load
    - Going past clean form to add reps or distance
    - Skipping warm-up sets and going straight to heavy
    - Holding the breath through the whole rep — brace and breathe in cycles
  breathing_cues: |
    Breathe in cycles — brace for the rep, exhale briefly between reps.
  primary_benefit: |
    Builds whole-body strength under awkward load — the kind of work that translates to real-world lifting.
- name: Toe Touchers
  form_description: |
    Ease into the Toe Touchers slowly, letting the tissue lengthen rather than forcing the range. Find the position where you feel a clear stretch in the target muscle and hold with steady breathing. Back off the moment a sharp sensation appears — the goal is mobility, not a fight with the joint.
  common_mistakes: |
    - Bouncing in and out of the stretch
    - Forcing past sharp pain
    - Holding the breath under tension
    - Letting the body twist sideways and dumping the stretch
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the target tissue — useful warm-up to clear a range or cool-down between heavy sessions.
- name: Torso Rotation
  form_description: |
    Ease into the Torso Rotation slowly, letting the tissue lengthen rather than forcing the range. Find the position where you feel a clear stretch in the target muscle and hold with steady breathing. Back off the moment a sharp sensation appears — the goal is mobility, not a fight with the joint.
