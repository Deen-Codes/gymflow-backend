- name: Jackknife Sit-Up
  form_description: |
    Get into the Jackknife Sit-Up starting position with the ribs stacked over the hips and the lower back pressed lightly into the floor or pad. Drive the ribcage towards the hips by shortening the abs, not by hinging at the hips. Squeeze at the top, then return under tight control rather than dropping into the next rep.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Trains the abs under steady tension — the kind of work that builds ab thickness rather than just endurance.
- name: Janda Sit-Up
  form_description: |
    Take the start position with the head neutral and the chin off the chest — don't pull on the neck to fold up. Curl the torso up by contracting the abs, leading with the chest rather than yanking with the arms. Squeeze at the top, then return under tight control rather than dropping into the next rep.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
