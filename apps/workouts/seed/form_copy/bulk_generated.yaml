- name: Single-Arm Cable Crossover
  form_description: |
    Take the Single-Arm Cable Crossover starting position with the chest tall and the shoulder blades pinned down. Open the arms out wide in a smooth arc, letting the chest stretch but not the shoulder joint. Drive the hands together using the chest, not the arms, and squeeze for a beat at the midpoint.
  common_mistakes: |
    - Bending the elbows mid-rep to turn it into a press
    - Letting the hands fly open at the bottom and yank the shoulder
    - Shrugging the shoulders up to assist the squeeze
    - Cutting the bottom range short and missing the chest stretch
  breathing_cues: |
    Inhale as the arms open, exhale as you squeeze them together.
  primary_benefit: |
    Isolates the chest under direct tension — grows the inner pec line without overloading the shoulder.
- name: Single-Arm Linear Jammer
  form_description: |
    Set up for the Single-Arm Linear Jammer sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: Single-Arm Push-Up
  form_description: |
    Set up for the Single-Arm Push-Up with the shoulder blades pinned back and down, feet planted firmly. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Drive the weight back up by squeezing the chest, stopping just short of a hard lockout.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the chest under heavy load through a long range — the foundational pressing lift for size and strength.
- name: Single-Cone Sprint Drill
  form_description: |
