  primary_benefit: |
    Loads the lats through a long overhead stretch — the most efficient way to add back width.
- name: Weighted Sissy Squat
  form_description: |
    Take the Weighted Sissy Squat stance with the feet flat and the weight loaded over mid-foot. Descend by sitting between the hips, keeping the torso angle steady and the heels planted. Drive up through mid-foot to stand, stopping just short of locking out at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Trains the squat pattern under load — the workhorse for building lower-body size and power.
- name: Weighted Sit-Ups - With Bands
  form_description: |
    Get into the Weighted Sit-Ups - With Bands starting position with the ribs stacked over the hips and the lower back pressed lightly into the floor or pad. Curl the torso up by contracting the abs, leading with the chest rather than yanking with the arms. Hold the top position for a count, then return slowly so the abs eccentric-load on the way down.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
