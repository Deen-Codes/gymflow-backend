- name: Parallel Bar Dip
  form_description: |
    Set up for the Parallel Bar Dip with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Pelvic Tilt Into Bridge
  form_description: |
    Ease into the Pelvic Tilt Into Bridge slowly, letting the lower back lengthen rather than forcing the position. Find the spot where you feel a clear stretch through the spine and hold it with steady breathing. Stop short of sharp pain — the lumbar spine doesn't want to be forced under tension.
  common_mistakes: |
    - Forcing past sharp pain in the lower back
    - Holding the breath under tension
    - Bouncing in and out instead of holding a steady position
    - Letting the hips tilt to one side mid-stretch
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Lengthens the lower-back muscles — useful recovery work between heavy hinge or squat sessions.
- name: Peroneals Stretch
  form_description: |
    Ease into the Peroneals Stretch with the heel pressing down and the front foot supporting the body. Hold the position where you feel a clear stretch through the calf, breathing steadily. Back off if you feel sharp pain in the achilles — the stretch should sit in the belly of the muscle.
  common_mistakes: |
    - Bouncing into and out of the stretch
    - Forcing past sharp pain
    - Letting the foot roll out and dumping the stretch
    - Holding the breath under tension
  breathing_cues: |
    Breathe slowly and steadily — exhale into each hold.
  primary_benefit: |
    Opens the calves and achilles — useful warm-up before sprinting or jumping work.
- name: Peroneals-SMR
  form_description: |
    Ease into the Peroneals-SMR with the heel pressing down and the front foot supporting the body. Hold the position where you feel a clear stretch through the calf, breathing steadily. Back off if you feel sharp pain in the achilles — the stretch should sit in the belly of the muscle.
  common_mistakes: |
    - Bouncing into and out of the stretch
    - Forcing past sharp pain
    - Letting the foot roll out and dumping the stretch
    - Holding the breath under tension
  breathing_cues: |
    Breathe slowly and steadily — exhale into each hold.
  primary_benefit: |
    Opens the calves and achilles — useful warm-up before sprinting or jumping work.
- name: Physioball Hip Bridge
  form_description: |
    Set up for the Physioball Hip Bridge with the upper back braced, hips loaded, and feet planted shoulder-width. Drive the hips up by squeezing the glutes — the upper back stays in contact with the pad or floor through the rep. Pause for a beat at the top, then lower under control. Don't extend the lower back to chase more range.
  common_mistakes: |
    - Hyperextending the lower back at the top instead of driving from the glutes
    - Pushing through the toes instead of mid-foot
    - Cutting the top contraction short
    - Letting the knees cave inward on the drive up
  breathing_cues: |
    Inhale at the bottom, exhale as you drive the hips up.
  primary_benefit: |
    Loads the glutes at peak contraction — the most efficient hip-hinge variant for building glute size.
- name: Pin Presses
  form_description: |
    Set up for the Pin Presses with the bar racked or loaded for the strongest line of pull. Brace hard through the trunk and move the bar in a controlled, straight path. Lock out fully at the top of the lift without overextending the spine, then reset between reps.
  common_mistakes: |
    - Losing the brace mid-rep and dumping the load into the lower back
    - Letting the bar drift off the strongest line of pull
    - Going too heavy and grinding through breaking form
    - Skipping the reset between reps and accumulating sloppy reps
  breathing_cues: |
    Big breath at the start, hold through the lift, exhale at lockout.
  primary_benefit: |
    Builds maximum strength in the competition pattern — useful for serious lifters peaking for a meet.
- name: Piriformis-SMR
  form_description: |
    Ease into the Piriformis-SMR slowly, letting the glute lengthen rather than forcing the position. Hold the position where you feel a clear stretch through the glute and steady the breath. Stop short of sharp pain — the goal is mobility through the hip, not pinching the joint.
  common_mistakes: |
    - Forcing the stretch past pain
    - Holding the breath under tension
    - Letting the hip rotate out and dumping the stretch
    - Rushing in and out of the position
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Opens the glute and external rotators of the hip — useful warm-up before squats or hinges.
- name: Plate Pinch
  form_description: |
    Set up for the Plate Pinch with the forearms supported and the wrists free to move through their full range. Curl the weight up by flexing through the wrist or rotating the forearm — the elbow stays still. Pause at the top of the contraction, then lower under control through a full stretch.
  common_mistakes: |
    - Lifting the elbow off the support to cheat the rep
    - Rushing the eccentric and missing the stretch
    - Going so heavy the grip fails before the forearm does
    - Half-repping at the top of the contraction
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Direct loading for the forearms — builds the grip strength that holds heavy compounds together.
- name: Plate Twist
  form_description: |
    Set up for the Plate Twist with the spine neutral and the lower back kept flat — no arching, no lifting the hips. Crunch the ribs down towards the pelvis using the abs — the lower back stays planted, not arched. Hold the top position for a count, then return slowly so the abs eccentric-load on the way down.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    A direct ab loader that scales with tempo — slow the eccentric and the muscle does more work per rep.
- name: Platform Hamstring Slides
  form_description: |
    Set up for the Platform Hamstring Slides with the pad sitting just above the heels and the knees just past the bench edge. Drive the heels back by squeezing the hamstrings — keep the rest of the body still. Pause at the top of the curl, then lower under control to near-full extension.
  common_mistakes: |
    - Lifting the hips off the bench to gain range
    - Banging the stack at the bottom (no controlled eccentric)
    - Half-repping — the top contraction is where it matters
    - Pad placed too far up the calf, working the achilles instead
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Isolates the hamstrings at the knee — grows the lower hamstring belly that hip-hinge work alone leaves behind.
- name: Plie Dumbbell Squat
  form_description: |
    Set up for the Plie Dumbbell Squat with the feet at hip-to-shoulder width, toes turned out slightly. Lower under control by bending the knees and hips together — knees track over the toes the whole way. Stand up by pushing the floor away, finishing tall without leaning back hard at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Trains the squat pattern under load — the workhorse for building lower-body size and power.
- name: Plyo Kettlebell Pushups
  form_description: |
    Set up for the Plyo Kettlebell Pushups with the shoulder blades pinned back and down, feet planted firmly. Lower the weight under control to the chest with the elbows tucked at roughly 45° to the body. Drive the weight back up by squeezing the chest, stopping just short of a hard lockout.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Loads the chest, front delts and triceps together — the highest-output upper-body pressing pattern.
- name: Plyo Push-up
  form_description: |
    Set up for the Plyo Push-up with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Posterior Tibialis Stretch
  form_description: |
    Ease into the Posterior Tibialis Stretch with the heel pressing down and the front foot supporting the body. Hold the position where you feel a clear stretch through the calf, breathing steadily. Back off if you feel sharp pain in the achilles — the stretch should sit in the belly of the muscle.
  common_mistakes: |
    - Bouncing into and out of the stretch
    - Forcing past sharp pain
    - Letting the foot roll out and dumping the stretch
    - Holding the breath under tension
  breathing_cues: |
    Breathe slowly and steadily — exhale into each hold.
  primary_benefit: |
    Opens the calves and achilles — useful warm-up before sprinting or jumping work.
- name: Power Clean
  form_description: |
    Set up for the Power Clean with the feet hip-width, knees softly bent, and the bar or weight close to the body. Lower by sliding the hips back and feeling the hamstrings load — the knees stay soft, not breaking forward. Reverse the hinge by pushing the hips through, finishing upright without overextending the lower back.
  common_mistakes: |
    - Rounding the lower back to chase range
    - Bending the knees through the lift — turns it into a squat
    - Going so heavy the hamstrings can't control the lower
    - Hyperextending the lower back at lockout
  breathing_cues: |
    Big breath at the top, brace through the hinge, exhale on the way up.
  primary_benefit: |
    Loads the hamstrings under deep stretch — the highest-output way to build hamstring size and posterior-chain strength.
- name: Power Clean from Blocks
  form_description: |
    Set up for the Power Clean from Blocks with the bar over mid-foot, hip-width stance, and a flat back. Move the bar in a vertical line, staying tight through the upper back and finishing the lift with full hip and knee extension. Catch in a stable position with the bar racked or overhead, then reset before the next rep.
  common_mistakes: |
    - Letting the bar drift away from the body off the floor
    - Cutting the hip extension short before the pull finishes
    - Catching with the knees collapsed inward
    - Going too heavy before the technique is clean
  breathing_cues: |
    Big breath at the bottom, brace through the lift, exhale at the top.
  primary_benefit: |
    Trains full-body coordination under load — the highest-output lift for athletic power, but only useful with clean technique.
- name: Power Jerk
  form_description: |
    Set up for the Power Jerk with the bar over mid-foot, hip-width stance, and a flat back. Move the bar in a vertical line, staying tight through the upper back and finishing the lift with full hip and knee extension. Catch in a stable position with the bar racked or overhead, then reset before the next rep.
  common_mistakes: |
    - Letting the bar drift away from the body off the floor
    - Cutting the hip extension short before the pull finishes
    - Catching with the knees collapsed inward
    - Going too heavy before the technique is clean
  breathing_cues: |
