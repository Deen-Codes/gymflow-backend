- name: Kettlebell Hang Clean
  form_description: |
    Take the Kettlebell Hang Clean stance with a flat back and the chest up before the hinge begins. Hinge at the hips by pushing the hips back, letting the chest tip forward in line with the back. Reverse the hinge by pushing the hips through, finishing upright without overextending the lower back.
  common_mistakes: |
    - Rounding the lower back to chase range
    - Bending the knees through the lift — turns it into a squat
    - Going so heavy the hamstrings can't control the lower
    - Hyperextending the lower back at lockout
  breathing_cues: |
