  primary_benefit: |
    Works the quads and glutes together with serious weight — the lift other leg work is measured against.
- name: Barbell Walking Lunge
  form_description: |
    Set up for the Barbell Walking Lunge with the feet at hip-to-shoulder width, toes turned out slightly. Lower under control by bending the knees and hips together — knees track over the toes the whole way. Reverse the descent by driving through the heels and mid-foot until you reach the top position.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Works the quads and glutes together with serious weight — the lift other leg work is measured against.
- name: Battling Ropes
  form_description: |
    Set up for the Battling Ropes sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: Bear Crawl Sled Drags
  form_description: |
    Set up for the Bear Crawl Sled Drags with the implement racked or gripped in the strongest position. Move the load through its full path under steady control — the implement is heavy and form is what keeps the joints intact. Finish the rep or carry in a stable position before resetting for the next attempt.
  common_mistakes: |
    - Letting the lower back round under heavy load
    - Going past clean form to add reps or distance
    - Skipping warm-up sets and going straight to heavy
    - Holding the breath through the whole rep — brace and breathe in cycles
  breathing_cues: |
    Breathe in cycles — brace for the rep, exhale briefly between reps.
  primary_benefit: |
    Builds whole-body strength under awkward load — the kind of work that translates to real-world lifting.
- name: Behind Head Chest Stretch
  form_description: |
    Ease into the Behind Head Chest Stretch slowly, letting the tissue lengthen rather than forcing the range. Find the position where you feel a clear stretch in the target muscle and hold with steady breathing. Back off the moment a sharp sensation appears — the goal is mobility, not a fight with the joint.
  common_mistakes: |
    - Bouncing in and out of the stretch
    - Forcing past sharp pain
    - Holding the breath under tension
    - Letting the body twist sideways and dumping the stretch
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the target tissue — useful warm-up to clear a range or cool-down between heavy sessions.
- name: Bench Jump
  form_description: |
    Set up for the Bench Jump with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Bench Press - Powerlifting
  form_description: |
    Set up for the Bench Press - Powerlifting with the bar racked or loaded for the strongest line of pull. Brace hard through the trunk and move the bar in a controlled, straight path. Lock out fully at the top of the lift without overextending the spine, then reset between reps.
