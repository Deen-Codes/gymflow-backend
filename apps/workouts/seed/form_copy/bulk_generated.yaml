  primary_benefit: |
    Builds whole-body strength under awkward load — the kind of work that translates to real-world lifting.
- name: Sled Reverse Flye
  form_description: |
    Set up for the Sled Reverse Flye with the torso tipped forward and a soft bend in the elbows. Raise the arms out to the sides by driving through the elbows — not by yanking with the hands. Stop when the upper arms are roughly parallel to the floor, squeeze through the rear delts and shoulder blades, then lower under control.
  common_mistakes: |
    - Standing too upright and turning it into a row
    - Using momentum to swing the weights up
    - Lifting with the traps instead of the rear delts
    - Locking the elbows straight under load
  breathing_cues: |
    Exhale as you raise, inhale on the lower.
  primary_benefit: |
    Isolates the rear delts — the cheapest insurance against pressing-heavy shoulder pain.
- name: Sled Row
  form_description: |
    Get into the Sled Row starting position with a flat back and the weight under control before the pull begins. Drive the elbows down and back, feeling the lats engage before the biceps take over. Pause briefly at the contraction, then lower slowly so the back eccentric-loads.
  common_mistakes: |
    - Pulling with the biceps instead of the back
    - Shrugging the shoulders up at the top instead of squeezing back
    - Cutting the bottom range short and missing the stretch
    - Using body english to throw the weight up
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Builds mid-back and lat thickness through a long pulling range — the backbone of any back day.
- name: Sledgehammer Swings
  form_description: |
    Set up for the Sledgehammer Swings with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Smith Incline Shoulder Raise
  form_description: |
    Stand or sit with the weights at the sides, elbows softly bent. Raise the arms out in a smooth arc, leading with the elbows, until the upper arms reach parallel with the floor. Stop there — going higher recruits the traps. Lower slowly; the lengthening phase is where the side delts grow.
  common_mistakes: |
    - Swinging the weights up with momentum
    - Going past parallel and shrugging the traps in
    - Locking the elbows straight under load
    - Rotating the wrists down (pour-the-jug) — shifts work off the side delt
  breathing_cues: |
    Inhale at the bottom, exhale as you raise the arms.
  primary_benefit: |
    Direct loading for the side delts — builds shoulder width that pressing alone underdose.
- name: Smith Machine Behind the Back Shrug
  form_description: |
    Stand tall with the weight at arm's length, arms straight, shoulders relaxed at the start. Shrug the shoulders straight up towards the ears as high as they will go. Pause at the top, then lower under control to a full stretch without rolling the shoulders forward.
  common_mistakes: |
    - Rolling the shoulders forward through the rep
    - Bending the elbows to fold the weight up
    - Cutting the top range short
    - Using so much weight the bar barely moves
  breathing_cues: |
    Exhale as you shrug up, inhale as you lower.
  primary_benefit: |
    Direct loading for the upper traps — fills out the top of the shoulder line that pulling lifts alone often miss.
- name: Smith Machine Bench Press
  form_description: |
    Take the Smith Machine Bench Press starting position with the wrists stacked over the elbows and the chest up. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Press up in a straight line over the shoulders, squeezing the chest at the top without rolling the shoulders forward.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Loads the chest, front delts and triceps together — the highest-output upper-body pressing pattern.
- name: Smith Machine Bent Over Row
  form_description: |
    Set up for the Smith Machine Bent Over Row with the chest up, shoulder blades pulled down, and arms fully extended. Pull by driving the elbows back, leading with the elbow rather than yanking with the hands. Squeeze the mid-back at the top of the pull, then return under control to a full stretch.
  common_mistakes: |
    - Pulling with the biceps instead of the back
    - Shrugging the shoulders up at the top instead of squeezing back
    - Cutting the bottom range short and missing the stretch
    - Using body english to throw the weight up
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Builds mid-back and lat thickness through a long pulling range — the backbone of any back day.
- name: Smith Machine Calf Raise
  form_description: |
    Set up for the Smith Machine Calf Raise with the balls of the feet on a raised platform or step and the heels free to drop below. Drop the heels for a full stretch at the bottom, then drive up onto the toes and squeeze the calves hard at the top. The slow lengthening phase matters most — three seconds down beats a fast bounce.
  common_mistakes: |
    - Bouncing reps for tendon spring instead of calf work
    - Cutting the bottom stretch short
    - Letting the knees drift inward through the rep
    - Going through the motion without pausing at the top contraction
  breathing_cues: |
    Inhale on the descent, exhale at the top squeeze.
  primary_benefit: |
    Builds the calves through a long stretch-to-contraction range — the only way to grow lower legs that have been stubborn.
- name: Smith Machine Close-Grip Bench Press
  form_description: |
    Set up for the Smith Machine Close-Grip Bench Press with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Smith Machine Decline Press
  form_description: |
    Set up for the Smith Machine Decline Press with the shoulder blades pinned back and down, feet planted firmly. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Press up in a straight line over the shoulders, squeezing the chest at the top without rolling the shoulders forward.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the chest under heavy load through a long range — the foundational pressing lift for size and strength.
- name: Smith Machine Hang Power Clean
  form_description: |
    Set up for the Smith Machine Hang Power Clean with the feet hip-width, knees softly bent, and the bar or weight close to the body. Lower by sliding the hips back and feeling the hamstrings load — the knees stay soft, not breaking forward. Drive the hips forward to stand tall, squeezing the glutes at the top without leaning back.
  common_mistakes: |
    - Rounding the lower back to chase range
    - Bending the knees through the lift — turns it into a squat
    - Going so heavy the hamstrings can't control the lower
    - Hyperextending the lower back at lockout
  breathing_cues: |
    Big breath at the top, brace through the hinge, exhale on the way up.
  primary_benefit: |
    Loads the hamstrings under deep stretch — the highest-output way to build hamstring size and posterior-chain strength.
- name: Smith Machine Hip Raise
  form_description: |
    Set up for the Smith Machine Hip Raise with the spine neutral and the lower back kept flat — no arching, no lifting the hips. Curl the torso up by contracting the abs, leading with the chest rather than yanking with the arms. Squeeze at the top, then return under tight control rather than dropping into the next rep.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Loads the abs through a controlled spinal flexion — useful for adding direct ab volume that crunches alone underdose.
- name: Smith Machine Incline Bench Press
  form_description: |
    Set up for the Smith Machine Incline Bench Press with the shoulder blades pinned back and down, feet planted firmly. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Drive the weight back up by squeezing the chest, stopping just short of a hard lockout.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Loads the chest, front delts and triceps together — the highest-output upper-body pressing pattern.
- name: Smith Machine Leg Press
  form_description: |
    Take the Smith Machine Leg Press stance with the feet flat and the weight loaded over mid-foot. Descend by sitting between the hips, keeping the torso angle steady and the heels planted. Reverse the descent by driving through the heels and mid-foot until you reach the top position.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Loads the quads heavily through a long range — a foundational lift for adding leg size and strength.
- name: Smith Machine One-Arm Upright Row
  form_description: |
    Set up for the Smith Machine One-Arm Upright Row with the bar or weight at shoulder height, ribs braced, feet planted. Drive the weight up by extending through the shoulders, keeping the bar path close to the face. Finish overhead with the head pushed slightly forward so the bar sits over mid-foot. Lower under control to the start position.
  common_mistakes: |
    - Pressing the bar in front of the face instead of overhead
    - Hyperextending the lower back at lockout
    - Letting the elbows flare wide at the bottom
    - Cutting the bottom range short
  breathing_cues: |
    Inhale at the top, brace through the descent, exhale through the press.
  primary_benefit: |
    Builds overhead pressing strength through the shoulder girdle — a full upper-body strength lift, not just a delt builder.
- name: Smith Machine Overhead Shoulder Press
  form_description: |
    Set up for the Smith Machine Overhead Shoulder Press sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
