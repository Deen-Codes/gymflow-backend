- name: One-Legged Cable Kickback
  form_description: |
    Set up for the One-Legged Cable Kickback with the spine neutral and the working leg ready to move through its full range. Drive the working leg back or up by contracting the glute, not by arching the lower back. Squeeze at the top of the range, then lower under control to the start position.
  common_mistakes: |
    - Arching the lower back instead of contracting the glute
    - Swinging the leg with momentum
    - Cutting the top squeeze short
    - Going so heavy form breaks before the muscle works
  breathing_cues: |
    Inhale at the start, exhale as you drive the leg back.
  primary_benefit: |
    Directly loads the glute through hip extension — useful for adding glute volume without taxing the lower back.
