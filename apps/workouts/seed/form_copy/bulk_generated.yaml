- name: Adductor
  form_description: |
    Ease into the Adductor slowly, letting the inner thigh lengthen rather than forcing the range. Find the position where you feel a clear stretch through the adductors and hold with steady breathing. Stop short of sharp pain — the joint is delicate at end range.
  common_mistakes: |
    - Forcing past sharp pain instead of easing in
    - Bouncing in and out of the stretch
    - Letting the hips collapse and dumping the stretch
    - Holding the breath under tension
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Opens the inner thigh and groin — useful warm-up before squats or wide-stance work.
