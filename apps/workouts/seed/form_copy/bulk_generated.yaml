- name: All Fours Quad Stretch
  form_description: |
    Take the All Fours Quad Stretch position slowly, easing into the stretch rather than forcing it. Once you feel a clear tension through the front of the thigh, hold the position with steady breathing. Stop short of any sharp pain — the goal is lengthened tissue, not a fight with the joint.
  common_mistakes: |
    - Forcing the stretch past pain instead of easing in
    - Holding the breath under tension
    - Letting the hips tilt to one side and dumping the stretch
    - Bouncing in and out instead of holding a steady position
  breathing_cues: |
    Breathe slowly and steadily — exhale into the deeper part of each hold.
  primary_benefit: |
    Lengthens the quad and hip flexor — useful warm-up or cool-down work for lifters who squat heavy.
- name: Alternate Hammer Curl
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Loads the biceps directly — a clean way to add arm volume without leaning on compound pulls.
- name: Alternate Heel Touchers
  form_description: |
    Get into the Alternate Heel Touchers starting position with the ribs stacked over the hips and the lower back pressed lightly into the floor or pad. Crunch the ribs down towards the pelvis using the abs — the lower back stays planted, not arched. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
