- name: Air Bike
  form_description: |
    Set up for the Air Bike with the spine neutral and the lower back kept flat — no arching, no lifting the hips. Crunch the ribs down towards the pelvis using the abs — the lower back stays planted, not arched. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
