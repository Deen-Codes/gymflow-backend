- name: Cable Preacher Curl
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Builds the biceps in a strict pulling line — the bread-and-butter arm lift across every programme.
- name: Cable Rear Delt Fly
  form_description: |
    Set up for the Cable Rear Delt Fly with the torso tipped forward and a soft bend in the elbows. Raise the arms out to the sides by driving through the elbows — not by yanking with the hands. Stop when the upper arms are roughly parallel to the floor, squeeze through the rear delts and shoulder blades, then lower under control.
  common_mistakes: |
    - Standing too upright and turning it into a row
    - Using momentum to swing the weights up
    - Lifting with the traps instead of the rear delts
    - Locking the elbows straight under load
  breathing_cues: |
    Exhale as you raise, inhale on the lower.
  primary_benefit: |
    Isolates the rear delts — the cheapest insurance against pressing-heavy shoulder pain.
- name: Cable Reverse Crunch
  form_description: |
    Set up for the Cable Reverse Crunch with the spine neutral and the lower back kept flat — no arching, no lifting the hips. Drive the ribcage towards the hips by shortening the abs, not by hinging at the hips. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Trains the abs under steady tension — the kind of work that builds ab thickness rather than just endurance.
- name: Cable Rope Overhead Triceps Extension
  form_description: |
    Set up for the Cable Rope Overhead Triceps Extension with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Cable Rope Rear-Delt Rows
  form_description: |
    Set up for the Cable Rope Rear-Delt Rows with the bar or weight at shoulder height, ribs braced, feet planted. Drive the weight up by extending through the shoulders, keeping the bar path close to the face. Finish overhead with the head pushed slightly forward so the bar sits over mid-foot. Lower under control to the start position.
  common_mistakes: |
    - Pressing the bar in front of the face instead of overhead
    - Hyperextending the lower back at lockout
    - Letting the elbows flare wide at the bottom
    - Cutting the bottom range short
  breathing_cues: |
    Inhale at the top, brace through the descent, exhale through the press.
  primary_benefit: |
    Builds overhead pressing strength through the shoulder girdle — a full upper-body strength lift, not just a delt builder.
- name: Cable Russian Twists
  form_description: |
    Take the start position with the head neutral and the chin off the chest — don't pull on the neck to fold up. Crunch the ribs down towards the pelvis using the abs — the lower back stays planted, not arched. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    A direct ab loader that scales with tempo — slow the eccentric and the muscle does more work per rep.
- name: Cable Seated Crunch
  form_description: |
    Set up for the Cable Seated Crunch with the spine neutral and the lower back kept flat — no arching, no lifting the hips. Curl the torso up by contracting the abs, leading with the chest rather than yanking with the arms. Squeeze at the top, then return under tight control rather than dropping into the next rep.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Loads the abs through a controlled spinal flexion — useful for adding direct ab volume that crunches alone underdose.
- name: Cable Seated Lateral Raise
  form_description: |
    Stand or sit with the weights at the sides, elbows softly bent. Raise the arms out in a smooth arc, leading with the elbows, until the upper arms reach parallel with the floor. Stop there — going higher recruits the traps. Lower slowly; the lengthening phase is where the side delts grow.
  common_mistakes: |
    - Swinging the weights up with momentum
    - Going past parallel and shrugging the traps in
    - Locking the elbows straight under load
    - Rotating the wrists down (pour-the-jug) — shifts work off the side delt
  breathing_cues: |
    Inhale at the bottom, exhale as you raise the arms.
  primary_benefit: |
    Direct loading for the side delts — builds shoulder width that pressing alone underdose.
- name: Cable Shoulder Press
  form_description: |
    Set up for the Cable Shoulder Press sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: Cable Shrugs
  form_description: |
    Stand tall with the weight at arm's length, arms straight, shoulders relaxed at the start. Shrug the shoulders straight up towards the ears as high as they will go. Pause at the top, then lower under control to a full stretch without rolling the shoulders forward.
  common_mistakes: |
    - Rolling the shoulders forward through the rep
    - Bending the elbows to fold the weight up
    - Cutting the top range short
    - Using so much weight the bar barely moves
  breathing_cues: |
    Exhale as you shrug up, inhale as you lower.
  primary_benefit: |
    Direct loading for the upper traps — fills out the top of the shoulder line that pulling lifts alone often miss.
- name: Cable Wrist Curl
  form_description: |
    Set up for the Cable Wrist Curl with the forearms supported and the wrists free to move through their full range. Curl the weight up by flexing through the wrist or rotating the forearm — the elbow stays still. Pause at the top of the contraction, then lower under control through a full stretch.
  common_mistakes: |
    - Lifting the elbow off the support to cheat the rep
    - Rushing the eccentric and missing the stretch
    - Going so heavy the grip fails before the forearm does
    - Half-repping at the top of the contraction
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Direct loading for the forearms — builds the grip strength that holds heavy compounds together.
- name: Calf Press
  form_description: |
    Set up for the Calf Press with the balls of the feet on a raised platform or step and the heels free to drop below. Drop the heels for a full stretch at the bottom, then drive up onto the toes and squeeze the calves hard at the top. The slow lengthening phase matters most — three seconds down beats a fast bounce.
  common_mistakes: |
    - Bouncing reps for tendon spring instead of calf work
    - Cutting the bottom stretch short
    - Letting the knees drift inward through the rep
    - Going through the motion without pausing at the top contraction
  breathing_cues: |
    Inhale on the descent, exhale at the top squeeze.
  primary_benefit: |
    Direct calf loading through a long range — the workhorse for lower-leg size.
- name: Calf Press On The Leg Press Machine
  form_description: |
    Set up for the Calf Press On The Leg Press Machine with the balls of the feet on a raised platform or step and the heels free to drop below. Drop the heels for a full stretch at the bottom, then drive up onto the toes and squeeze the calves hard at the top. The slow lengthening phase matters most — three seconds down beats a fast bounce.
  common_mistakes: |
    - Bouncing reps for tendon spring instead of calf work
    - Cutting the bottom stretch short
    - Letting the knees drift inward through the rep
    - Going through the motion without pausing at the top contraction
  breathing_cues: |
    Inhale on the descent, exhale at the top squeeze.
  primary_benefit: |
    Builds the calves through a long stretch-to-contraction range — the only way to grow lower legs that have been stubborn.
- name: Calf Raise On A Dumbbell
  form_description: |
    Set up for the Calf Raise On A Dumbbell with the balls of the feet on a raised platform or step and the heels free to drop below. Drop the heels for a full stretch at the bottom, then drive up onto the toes and squeeze the calves hard at the top. The slow lengthening phase matters most — three seconds down beats a fast bounce.
