  form_description: |
    Ease into the Inchworm slowly, letting the hamstrings lengthen rather than forcing the range. Find the position where you feel a clear stretch behind the thigh and hold it with steady breathing. Back off the moment a sharp sensation appears — that's the joint, not the muscle.
  common_mistakes: |
    - Bouncing in and out instead of holding a steady position
    - Rounding the lower back to chase more range
    - Holding the breath under tension
    - Forcing past pain instead of easing in
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the hamstrings — useful warm-up or recovery work between heavy hinge sessions.
- name: Incline Barbell Triceps Extension
  form_description: |
    Set up for the Incline Barbell Triceps Extension with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Incline Bench Pull
  form_description: |
    Set up for the Incline Bench Pull with the arms relaxed at the start and the shoulder blade ready to retract. Lead with the elbow, pulling the working side back by driving from the lat — not the biceps. Pause at the peak, then lower under control so the back stays loaded on the way down.
  common_mistakes: |
    - Letting the biceps take over the pull
    - Twisting the torso to gain range
    - Shrugging the shoulder up at the top of the rep
    - Cutting the bottom stretch short
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Isolates the back fibres without the systemic load of a compound row — useful for adding back volume late in a session.
- name: Incline Cable Chest Press
  form_description: |
    Take the Incline Cable Chest Press starting position with the wrists stacked over the elbows and the chest up. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Drive the weight back up by squeezing the chest, stopping just short of a hard lockout.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the chest under heavy load through a long range — the foundational pressing lift for size and strength.
- name: Incline Cable Flye
  form_description: |
    Take the Incline Cable Flye starting position with the chest tall and the shoulder blades pinned down. Lower under control through a long stretch, keeping the elbow angle fixed. Bring the hands back together by squeezing the chest fibres — the elbows stay in their fixed bend.
  common_mistakes: |
    - Bending the elbows mid-rep to turn it into a press
    - Letting the hands fly open at the bottom and yank the shoulder
    - Shrugging the shoulders up to assist the squeeze
    - Cutting the bottom range short and missing the chest stretch
  breathing_cues: |
    Inhale as the arms open, exhale as you squeeze them together.
  primary_benefit: |
