- name: Band Hip Adductions
  form_description: |
    Sit or stand with the pads pressed against the inner thighs, hips at a comfortable angle. Squeeze the legs together by driving from the inner thighs, pausing briefly at the middle. Open back up under control — the slow lengthening phase is most of the work here.
  common_mistakes: |
    - Slamming the pads together with momentum
    - Letting the pads fly open at the bottom and yank the joint
    - Sitting hunched forward and shifting work to the back
    - Going so heavy hip flexors take over
  breathing_cues: |
    Inhale as the legs open, exhale as you squeeze them together.
  primary_benefit: |
    Builds the inner thigh — the only direct loader of a muscle group most squat-and-deadlift programmes neglect.
- name: Band Pull Apart
  form_description: |
    Stand or sit with the weights at the sides, elbows softly bent. Raise the arms out in a smooth arc, leading with the elbows, until the upper arms reach parallel with the floor. Stop there — going higher recruits the traps. Lower slowly; the lengthening phase is where the side delts grow.
  common_mistakes: |
    - Swinging the weights up with momentum
    - Going past parallel and shrugging the traps in
    - Locking the elbows straight under load
    - Rotating the wrists down (pour-the-jug) — shifts work off the side delt
  breathing_cues: |
    Inhale at the bottom, exhale as you raise the arms.
  primary_benefit: |
    Direct loading for the side delts — builds shoulder width that pressing alone underdose.
- name: Band Skull Crusher
  form_description: |
    Set up for the Band lying tricep extension with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Barbell Ab Rollout
  form_description: |
    Take the start position with the head neutral and the chin off the chest — don't pull on the neck to fold up. Drive the ribcage towards the hips by shortening the abs, not by hinging at the hips. Hold the top position for a count, then return slowly so the abs eccentric-load on the way down.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Trains the abs under steady tension — the kind of work that builds ab thickness rather than just endurance.
- name: Barbell Ab Rollout - On Knees
  form_description: |
    Get into the Barbell Ab Rollout - On Knees starting position with the ribs stacked over the hips and the lower back pressed lightly into the floor or pad. Curl the torso up by contracting the abs, leading with the chest rather than yanking with the arms. Hold the top position for a count, then return slowly so the abs eccentric-load on the way down.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    A direct ab loader that scales with tempo — slow the eccentric and the muscle does more work per rep.
- name: Barbell Bench Press - Medium Grip
  form_description: |
    Take the Barbell Bench Press - Medium Grip starting position with the wrists stacked over the elbows and the chest up. Lower the weight under control to the chest with the elbows tucked at roughly 45° to the body. Drive the weight back up by squeezing the chest, stopping just short of a hard lockout.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the chest under heavy load through a long range — the foundational pressing lift for size and strength.
- name: Barbell Curls Lying Against An Incline
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Builds the biceps in a strict pulling line — the bread-and-butter arm lift across every programme.
- name: Barbell Deadlift
  form_description: |
    Set up for the Barbell Deadlift with a flat back and the spine kept neutral throughout. Hinge or extend at the hips by driving from the glutes and lower back together. Stop at neutral spine alignment — going past straight under load stresses the lumbar joints without adding muscle work.
  common_mistakes: |
    - Hyperextending past straight at the top
    - Rounding the lower back to chase range
    - Using momentum on the way up
    - Loading so heavy form breaks before the set ends
  breathing_cues: |
    Inhale on the descent, exhale on the way up.
  primary_benefit: |
    Loads the spinal erectors and posterior chain together — builds the lower back endurance that heavy compounds demand.
- name: Barbell Full Squat
  form_description: |
    Set up for the Barbell Full Squat with the feet at hip-to-shoulder width, toes turned out slightly. Descend by sitting between the hips, keeping the torso angle steady and the heels planted. Stand up by pushing the floor away, finishing tall without leaning back hard at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Trains the squat pattern under load — the workhorse for building lower-body size and power.
- name: Barbell Glute Bridge
  form_description: |
    Set up for the Barbell Glute Bridge with the bar racked or loaded for the strongest line of pull. Brace hard through the trunk and move the bar in a controlled, straight path. Lock out fully at the top of the lift without overextending the spine, then reset between reps.
  common_mistakes: |
    - Losing the brace mid-rep and dumping the load into the lower back
    - Letting the bar drift off the strongest line of pull
    - Going too heavy and grinding through breaking form
    - Skipping the reset between reps and accumulating sloppy reps
  breathing_cues: |
    Big breath at the start, hold through the lift, exhale at lockout.
  primary_benefit: |
    Builds maximum strength in the competition pattern — useful for serious lifters peaking for a meet.
- name: Barbell Guillotine Bench Press
  form_description: |
    Take the Barbell Guillotine Bench Press starting position with the wrists stacked over the elbows and the chest up. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Drive the weight back up by squeezing the chest, stopping just short of a hard lockout.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Loads the chest, front delts and triceps together — the highest-output upper-body pressing pattern.
- name: Barbell Hack Squat
  form_description: |
    Take the Barbell Hack Squat stance with the feet flat and the weight loaded over mid-foot. Descend by sitting between the hips, keeping the torso angle steady and the heels planted. Drive up through mid-foot to stand, stopping just short of locking out at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Works the quads and glutes together with serious weight — the lift other leg work is measured against.
- name: Barbell Hip Thrust
  form_description: |
    Set up for the Barbell Hip Thrust with the bar racked or loaded for the strongest line of pull. Brace hard through the trunk and move the bar in a controlled, straight path. Lock out fully at the top of the lift without overextending the spine, then reset between reps.
  common_mistakes: |
    - Losing the brace mid-rep and dumping the load into the lower back
    - Letting the bar drift off the strongest line of pull
    - Going too heavy and grinding through breaking form
    - Skipping the reset between reps and accumulating sloppy reps
  breathing_cues: |
    Big breath at the start, hold through the lift, exhale at lockout.
  primary_benefit: |
    Builds maximum strength in the competition pattern — useful for serious lifters peaking for a meet.
- name: Barbell Incline Bench Press - Medium Grip
  form_description: |
    Take the Barbell Incline Bench Press - Medium Grip starting position with the wrists stacked over the elbows and the chest up. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Press up in a straight line over the shoulders, squeezing the chest at the top without rolling the shoulders forward.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Loads the chest, front delts and triceps together — the highest-output upper-body pressing pattern.
- name: Barbell Incline Shoulder Raise
  form_description: |
    Set up for the Barbell Incline Shoulder Raise sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: Barbell Lunge
  form_description: |
    Set up for the Barbell Lunge with the feet at hip-to-shoulder width, toes turned out slightly. Descend by sitting between the hips, keeping the torso angle steady and the heels planted. Drive up through mid-foot to stand, stopping just short of locking out at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Loads the quads heavily through a long range — a foundational lift for adding leg size and strength.
- name: Barbell Rear Delt Row
  form_description: |
    Set up for the Barbell Rear Delt Row with the bar or weight at shoulder height, ribs braced, feet planted. Drive the weight up by extending through the shoulders, keeping the bar path close to the face. Finish overhead with the head pushed slightly forward so the bar sits over mid-foot. Lower under control to the start position.
  common_mistakes: |
    - Pressing the bar in front of the face instead of overhead
    - Hyperextending the lower back at lockout
    - Letting the elbows flare wide at the bottom
    - Cutting the bottom range short
  breathing_cues: |
    Inhale at the top, brace through the descent, exhale through the press.
  primary_benefit: |
    Builds overhead pressing strength through the shoulder girdle — a full upper-body strength lift, not just a delt builder.
- name: Barbell Rollout from Bench
  form_description: |
    Take the start position with the head neutral and the chin off the chest — don't pull on the neck to fold up. Curl the torso up by contracting the abs, leading with the chest rather than yanking with the arms. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Trains the abs under steady tension — the kind of work that builds ab thickness rather than just endurance.
- name: Barbell Seated Calf Raise
  form_description: |
    Set up for the Barbell Seated Calf Raise with the balls of the feet on a raised platform or step and the heels free to drop below. Drop the heels for a full stretch at the bottom, then drive up onto the toes and squeeze the calves hard at the top. The slow lengthening phase matters most — three seconds down beats a fast bounce.
  common_mistakes: |
    - Bouncing reps for tendon spring instead of calf work
    - Cutting the bottom stretch short
    - Letting the knees drift inward through the rep
    - Going through the motion without pausing at the top contraction
  breathing_cues: |
    Inhale on the descent, exhale at the top squeeze.
  primary_benefit: |
    Builds the calves through a long stretch-to-contraction range — the only way to grow lower legs that have been stubborn.
- name: Barbell Shoulder Press
  form_description: |
    Set up for the Barbell Shoulder Press sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: Barbell Shrug Behind The Back
  form_description: |
    Stand tall with the weight at arm's length, arms straight, shoulders relaxed at the start. Shrug the shoulders straight up towards the ears as high as they will go. Pause at the top, then lower under control to a full stretch without rolling the shoulders forward.
  common_mistakes: |
    - Rolling the shoulders forward through the rep
    - Bending the elbows to fold the weight up
    - Cutting the top range short
    - Using so much weight the bar barely moves
  breathing_cues: |
    Exhale as you shrug up, inhale as you lower.
  primary_benefit: |
    Direct loading for the upper traps — fills out the top of the shoulder line that pulling lifts alone often miss.
- name: Barbell Side Bend
  form_description: |
    Take the start position with the head neutral and the chin off the chest — don't pull on the neck to fold up. Crunch the ribs down towards the pelvis using the abs — the lower back stays planted, not arched. Squeeze at the top, then return under tight control rather than dropping into the next rep.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    A direct ab loader that scales with tempo — slow the eccentric and the muscle does more work per rep.
- name: Barbell Side Split Squat
  form_description: |
    Get into the Barbell Side Split Squat with the chest tall and the upper back braced before the descent. Descend by sitting between the hips, keeping the torso angle steady and the heels planted. Drive up through mid-foot to stand, stopping just short of locking out at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Trains the squat pattern under load — the workhorse for building lower-body size and power.
- name: Barbell Squat
  form_description: |
    Set up for the Barbell Squat with the feet at hip-to-shoulder width, toes turned out slightly. Lower under control by bending the knees and hips together — knees track over the toes the whole way. Drive up through mid-foot to stand, stopping just short of locking out at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Works the quads and glutes together with serious weight — the lift other leg work is measured against.
- name: Barbell Squat To A Bench
  form_description: |
    Get into the Barbell Squat To A Bench with the chest tall and the upper back braced before the descent. Lower under control by bending the knees and hips together — knees track over the toes the whole way. Stand up by pushing the floor away, finishing tall without leaning back hard at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
