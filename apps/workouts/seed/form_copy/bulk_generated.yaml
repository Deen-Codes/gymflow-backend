- name: Seated Flat Bench Leg Pull-In
  form_description: |
    Take the start position with the head neutral and the chin off the chest — don't pull on the neck to fold up. Crunch the ribs down towards the pelvis using the abs — the lower back stays planted, not arched. Squeeze at the top, then return under tight control rather than dropping into the next rep.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Trains the abs under steady tension — the kind of work that builds ab thickness rather than just endurance.
- name: Seated Floor Hamstring Stretch
  form_description: |
    Ease into the Seated Floor Hamstring Stretch slowly, letting the hamstrings lengthen rather than forcing the range. Find the position where you feel a clear stretch behind the thigh and hold it with steady breathing. Back off the moment a sharp sensation appears — that's the joint, not the muscle.
  common_mistakes: |
    - Bouncing in and out instead of holding a steady position
    - Rounding the lower back to chase more range
    - Holding the breath under tension
    - Forcing past pain instead of easing in
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the hamstrings — useful warm-up or recovery work between heavy hinge sessions.
- name: Seated Front Deltoid
  form_description: |
    Ease into the Seated Front Deltoid slowly, letting the shoulder lengthen rather than forcing the range. Find the position where you feel a clear stretch through the joint and hold it with steady breathing. Back off if you feel sharp pain — the goal is mobility, not pinching the joint.
  common_mistakes: |
    - Forcing past sharp pain instead of easing in
    - Holding the breath under tension
    - Letting the shoulder shrug up into the stretch
    - Rushing the position before the tissue is warm
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Opens the shoulder girdle — useful pre-workout to clear the overhead range or post-workout for recovery.
- name: Seated Glute
  form_description: |
    Ease into the Seated Glute slowly, letting the glute lengthen rather than forcing the position. Hold the position where you feel a clear stretch through the glute and steady the breath. Stop short of sharp pain — the goal is mobility through the hip, not pinching the joint.
  common_mistakes: |
    - Forcing the stretch past pain
    - Holding the breath under tension
    - Letting the hip rotate out and dumping the stretch
    - Rushing in and out of the position
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Opens the glute and external rotators of the hip — useful warm-up before squats or hinges.
- name: Seated Good Mornings
  form_description: |
    Set up for the Seated Good Mornings with the bar racked or loaded for the strongest line of pull. Brace hard through the trunk and move the bar in a controlled, straight path. Lock out fully at the top of the lift without overextending the spine, then reset between reps.
  common_mistakes: |
    - Losing the brace mid-rep and dumping the load into the lower back
    - Letting the bar drift off the strongest line of pull
    - Going too heavy and grinding through breaking form
    - Skipping the reset between reps and accumulating sloppy reps
  breathing_cues: |
    Big breath at the start, hold through the lift, exhale at lockout.
  primary_benefit: |
    Builds maximum strength in the competition pattern — useful for serious lifters peaking for a meet.
