  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Chain Handle Extension
  form_description: |
    Set up for the Chain Handle Extension with the bar racked or loaded for the strongest line of pull. Brace hard through the trunk and move the bar in a controlled, straight path. Lock out fully at the top of the lift without overextending the spine, then reset between reps.
  common_mistakes: |
    - Losing the brace mid-rep and dumping the load into the lower back
    - Letting the bar drift off the strongest line of pull
    - Going too heavy and grinding through breaking form
    - Skipping the reset between reps and accumulating sloppy reps
  breathing_cues: |
    Big breath at the start, hold through the lift, exhale at lockout.
  primary_benefit: |
    Builds maximum strength in the competition pattern — useful for serious lifters peaking for a meet.
- name: Chain Press
  form_description: |
    Set up for the Chain Press with the bar racked or loaded for the strongest line of pull. Brace hard through the trunk and move the bar in a controlled, straight path. Lock out fully at the top of the lift without overextending the spine, then reset between reps.
  common_mistakes: |
    - Losing the brace mid-rep and dumping the load into the lower back
    - Letting the bar drift off the strongest line of pull
    - Going too heavy and grinding through breaking form
    - Skipping the reset between reps and accumulating sloppy reps
  breathing_cues: |
    Big breath at the start, hold through the lift, exhale at lockout.
  primary_benefit: |
    Builds maximum strength in the competition pattern — useful for serious lifters peaking for a meet.
- name: Chair Leg Extended Stretch
  form_description: |
    Ease into the Chair Leg Extended Stretch slowly, letting the hamstrings lengthen rather than forcing the range. Find the position where you feel a clear stretch behind the thigh and hold it with steady breathing. Back off the moment a sharp sensation appears — that's the joint, not the muscle.
  common_mistakes: |
    - Bouncing in and out instead of holding a steady position
    - Rounding the lower back to chase more range
    - Holding the breath under tension
    - Forcing past pain instead of easing in
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the hamstrings — useful warm-up or recovery work between heavy hinge sessions.
- name: Chair Lower Back Stretch
  form_description: |
    Ease into the Chair Lower Back Stretch slowly, letting the tissue lengthen rather than forcing the range. Find the position where you feel a clear stretch in the target muscle and hold with steady breathing. Back off the moment a sharp sensation appears — the goal is mobility, not a fight with the joint.
  common_mistakes: |
    - Bouncing in and out of the stretch
    - Forcing past sharp pain
    - Holding the breath under tension
    - Letting the body twist sideways and dumping the stretch
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the target tissue — useful warm-up to clear a range or cool-down between heavy sessions.
- name: Chair Squat
  form_description: |
    Take the Chair Squat stance with the feet flat and the weight loaded over mid-foot. Lower under control by bending the knees and hips together — knees track over the toes the whole way. Reverse the descent by driving through the heels and mid-foot until you reach the top position.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Trains the squat pattern under load — the workhorse for building lower-body size and power.
- name: Chair Upper Body Stretch
  form_description: |
    Ease into the Chair Upper Body Stretch slowly, letting the shoulder lengthen rather than forcing the range. Find the position where you feel a clear stretch through the joint and hold it with steady breathing. Back off if you feel sharp pain — the goal is mobility, not pinching the joint.
  common_mistakes: |
    - Forcing past sharp pain instead of easing in
    - Holding the breath under tension
    - Letting the shoulder shrug up into the stretch
    - Rushing the position before the tissue is warm
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Opens the shoulder girdle — useful pre-workout to clear the overhead range or post-workout for recovery.
- name: Chest And Front Of Shoulder Stretch
  form_description: |
