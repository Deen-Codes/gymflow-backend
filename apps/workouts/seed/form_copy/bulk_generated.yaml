    Take the start position with the head neutral and the chin off the chest — don't pull on the neck to fold up. Crunch the ribs down towards the pelvis using the abs — the lower back stays planted, not arched. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
