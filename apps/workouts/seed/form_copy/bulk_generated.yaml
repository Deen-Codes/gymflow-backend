- name: Cross-Body Crunch
  form_description: |
    Get into the Cross-Body Crunch starting position with the ribs stacked over the hips and the lower back pressed lightly into the floor or pad. Crunch the ribs down towards the pelvis using the abs — the lower back stays planted, not arched. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    A direct ab loader that scales with tempo — slow the eccentric and the muscle does more work per rep.
- name: Crossover Reverse Lunge
  form_description: |
    Ease into the Crossover Reverse Lunge slowly, letting the lower back lengthen rather than forcing the position. Find the spot where you feel a clear stretch through the spine and hold it with steady breathing. Stop short of sharp pain — the lumbar spine doesn't want to be forced under tension.
  common_mistakes: |
    - Forcing past sharp pain in the lower back
    - Holding the breath under tension
    - Bouncing in and out instead of holding a steady position
    - Letting the hips tilt to one side mid-stretch
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Lengthens the lower-back muscles — useful recovery work between heavy hinge or squat sessions.
