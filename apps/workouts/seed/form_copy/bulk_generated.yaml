- name: Alternate Leg Diagonal Bound
  form_description: |
    Set up for the Alternate Leg Diagonal Bound with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Alternating Cable Shoulder Press
  form_description: |
    Set up for the Alternating Cable Shoulder Press sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: Alternating Deltoid Raise
  form_description: |
    Stand or sit with the weights at the sides, elbows softly bent. Raise the arms out in a smooth arc, leading with the elbows, until the upper arms reach parallel with the floor. Stop there — going higher recruits the traps. Lower slowly; the lengthening phase is where the side delts grow.
  common_mistakes: |
    - Swinging the weights up with momentum
    - Going past parallel and shrugging the traps in
    - Locking the elbows straight under load
    - Rotating the wrists down (pour-the-jug) — shifts work off the side delt
  breathing_cues: |
    Inhale at the bottom, exhale as you raise the arms.
  primary_benefit: |
    Direct loading for the side delts — builds shoulder width that pressing alone underdose.
- name: Alternating Floor Press
  form_description: |
    Set up for the Alternating Floor Press with the shoulder blades pinned back and down, feet planted firmly. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Press up in a straight line over the shoulders, squeezing the chest at the top without rolling the shoulders forward.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Loads the chest, front delts and triceps together — the highest-output upper-body pressing pattern.
- name: Alternating Hang Clean
  form_description: |
    Set up for the Alternating Hang Clean with the feet hip-width, knees softly bent, and the bar or weight close to the body. Hinge at the hips by pushing the hips back, letting the chest tip forward in line with the back. Reverse the hinge by pushing the hips through, finishing upright without overextending the lower back.
  common_mistakes: |
    - Rounding the lower back to chase range
    - Bending the knees through the lift — turns it into a squat
    - Going so heavy the hamstrings can't control the lower
    - Hyperextending the lower back at lockout
  breathing_cues: |
    Big breath at the top, brace through the hinge, exhale on the way up.
  primary_benefit: |
    Loads the hamstrings under deep stretch — the highest-output way to build hamstring size and posterior-chain strength.
- name: Alternating Kettlebell Press
  form_description: |
    Set up for the Alternating Kettlebell Press sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
