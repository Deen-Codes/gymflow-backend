- name: One-Arm Medicine Ball Slam
  form_description: |
    Get into the One-Arm Medicine Ball Slam starting position with the ribs stacked over the hips and the lower back pressed lightly into the floor or pad. Curl the torso up by contracting the abs, leading with the chest rather than yanking with the arms. Hold the top position for a count, then return slowly so the abs eccentric-load on the way down.
  common_mistakes: |
