- name: Trail Running/Walking
  form_description: |
    Set up for the Trail Running/Walking with the body in a clean working position and the breath ready to settle into rhythm. Work at an effort that matches the session — easy aerobic, threshold, or sprint — rather than starting hot. Keep the form clean through the whole bout; fatigue should slow you down, not break your posture.
  common_mistakes: |
    - Starting too hard and blowing up the second half of the session
    - Letting form break as fatigue sets in
    - Mouth-breathing only — keep some nasal work in for aerobic sets
    - Skipping the cool-down and stacking cardiovascular stress
  breathing_cues: |
    Breathe in rhythm with the work — nasal where you can, mouth-and-nose at higher efforts.
  primary_benefit: |
    Builds cardiovascular base — useful for recovery between heavy sessions and for long-term work capacity.
- name: Tricep Dumbbell Kickback
  form_description: |
    Set up for the Tricep Dumbbell Kickback with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
