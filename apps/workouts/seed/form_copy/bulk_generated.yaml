- name: Quick Leap
  form_description: |
    Set up for the Quick Leap with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Rack Delivery
  form_description: |
    Set up for the Rack Delivery with the bar over mid-foot, hip-width stance, and a flat back. Move the bar in a vertical line, staying tight through the upper back and finishing the lift with full hip and knee extension. Catch in a stable position with the bar racked or overhead, then reset before the next rep.
  common_mistakes: |
    - Letting the bar drift away from the body off the floor
    - Cutting the hip extension short before the pull finishes
    - Catching with the knees collapsed inward
    - Going too heavy before the technique is clean
  breathing_cues: |
    Big breath at the bottom, brace through the lift, exhale at the top.
  primary_benefit: |
    Trains full-body coordination under load — the highest-output lift for athletic power, but only useful with clean technique.
- name: Rack Pull with Bands
  form_description: |
    Set up for the Rack Pull with Bands with the bar racked or loaded for the strongest line of pull. Brace hard through the trunk and move the bar in a controlled, straight path. Lock out fully at the top of the lift without overextending the spine, then reset between reps.
  common_mistakes: |
    - Losing the brace mid-rep and dumping the load into the lower back
    - Letting the bar drift off the strongest line of pull
    - Going too heavy and grinding through breaking form
    - Skipping the reset between reps and accumulating sloppy reps
  breathing_cues: |
    Big breath at the start, hold through the lift, exhale at lockout.
  primary_benefit: |
    Builds maximum strength in the competition pattern — useful for serious lifters peaking for a meet.
- name: Rack Pulls
  form_description: |
    Set up for the Rack Pulls with the bar racked or loaded for the strongest line of pull. Brace hard through the trunk and move the bar in a controlled, straight path. Lock out fully at the top of the lift without overextending the spine, then reset between reps.
  common_mistakes: |
