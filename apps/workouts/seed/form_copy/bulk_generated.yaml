- name: Seated Head Harness Neck Resistance
  form_description: |
    Set up for the Seated Head Harness Neck Resistance with the spine neutral and the head moving through a small, controlled range. Move slowly — neck training rewards control over weight. Pause briefly at the end of each range, then return to the start position without losing tension.
  common_mistakes: |
    - Going too heavy and jerking the neck through reps
    - Cutting the range short to chase weight
    - Pulling the head with the hands instead of the neck muscles
    - Holding the breath under tension
  breathing_cues: |
    Breathe steadily through each rep.
  primary_benefit: |
    Strengthens the neck musculature — useful for contact-sport lifters and as insurance against poor desk posture.
