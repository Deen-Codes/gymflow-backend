  primary_benefit: |
    Works the quads and glutes together with serious weight — the lift other leg work is measured against.
- name: Wide Stance Barbell Squat
  form_description: |
    Get into the Wide Stance Barbell Squat with the chest tall and the upper back braced before the descent. Bend the knees and hips together to lower into the bottom — let the chest stay up rather than tipping forward. Drive up through mid-foot to stand, stopping just short of locking out at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Works the quads and glutes together with serious weight — the lift other leg work is measured against.
- name: Wide Stance Stiff Legs
  form_description: |
    Set up for the Wide Stance Stiff Legs with the bar over mid-foot, hip-width stance, and a flat back. Move the bar in a vertical line, staying tight through the upper back and finishing the lift with full hip and knee extension. Catch in a stable position with the bar racked or overhead, then reset before the next rep.
  common_mistakes: |
    - Letting the bar drift away from the body off the floor
    - Cutting the hip extension short before the pull finishes
    - Catching with the knees collapsed inward
    - Going too heavy before the technique is clean
  breathing_cues: |
    Big breath at the bottom, brace through the lift, exhale at the top.
  primary_benefit: |
    Trains full-body coordination under load — the highest-output lift for athletic power, but only useful with clean technique.
- name: Wide-Grip Barbell Bench Press
  form_description: |
    Take the Wide-Grip Barbell Bench Press starting position with the wrists stacked over the elbows and the chest up. Lower the weight under control to the chest with the elbows tucked at roughly 45° to the body. Drive the weight back up by squeezing the chest, stopping just short of a hard lockout.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the chest under heavy load through a long range — the foundational pressing lift for size and strength.
- name: Wide-Grip Decline Barbell Bench Press
  form_description: |
    Take the Wide-Grip Decline Barbell Bench Press starting position with the wrists stacked over the elbows and the chest up. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Press up in a straight line over the shoulders, squeezing the chest at the top without rolling the shoulders forward.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Loads the chest, front delts and triceps together — the highest-output upper-body pressing pattern.
- name: Wide-Grip Decline Barbell Pullover
  form_description: |
    Take the Wide-Grip Decline Barbell Pullover starting position with the wrists stacked over the elbows and the chest up. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Press up in a straight line over the shoulders, squeezing the chest at the top without rolling the shoulders forward.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Loads the chest, front delts and triceps together — the highest-output upper-body pressing pattern.
- name: Wide-Grip Pulldown Behind The Neck
  form_description: |
    Set up for the Wide-Grip Pulldown Behind The Neck with the thigh pad snug, arms fully extended overhead, and the shoulder blades pulled down out of the shrug. Pull by driving the elbows down towards the ribs, feeling the lats engage before the arms take over. Squeeze at the bottom of the pull, then return under control to a full overhead stretch.
  common_mistakes: |
    - Pulling the bar behind the neck — rotator cuff stress
    - Leaning back hard and turning it into a row
    - Yanking with the biceps instead of leading with the lats
    - Cutting the top stretch short between reps
  breathing_cues: |
    Inhale at the top, exhale as you pull down.
  primary_benefit: |
    Loads the lats through a long overhead stretch — the most efficient way to add back width.
- name: Wide-Grip Rear Pull-Up
  form_description: |
    Set up for the Wide-Grip Rear Pull-Up with the thigh pad snug, arms fully extended overhead, and the shoulder blades pulled down out of the shrug. Pull by driving the elbows down towards the ribs, feeling the lats engage before the arms take over. Squeeze at the bottom of the pull, then return under control to a full overhead stretch.
  common_mistakes: |
    - Pulling the bar behind the neck — rotator cuff stress
    - Leaning back hard and turning it into a row
    - Yanking with the biceps instead of leading with the lats
    - Cutting the top stretch short between reps
  breathing_cues: |
    Inhale at the top, exhale as you pull down.
  primary_benefit: |
    Loads the lats through a long overhead stretch — the most efficient way to add back width.
- name: Wide-Grip Standing Barbell Curl
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Loads the biceps directly — a clean way to add arm volume without leaning on compound pulls.
- name: Wind Sprints
  form_description: |
    Get into the Wind Sprints starting position with the ribs stacked over the hips and the lower back pressed lightly into the floor or pad. Curl the torso up by contracting the abs, leading with the chest rather than yanking with the arms. Hold the top position for a count, then return slowly so the abs eccentric-load on the way down.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Trains the abs under steady tension — the kind of work that builds ab thickness rather than just endurance.
- name: Windmills
  form_description: |
    Ease into the Windmills slowly, letting the outer hip lengthen rather than forcing the position. Hold the position where you feel a clear stretch through the side of the hip with steady breathing. Back off the moment a sharp sensation appears.
  common_mistakes: |
    - Forcing past pain instead of easing in
    - Holding the breath under tension
    - Letting the hip drop and dumping the stretch
    - Rushing in and out of the position
  breathing_cues: |
    Breathe slowly and steadily through the hold.
  primary_benefit: |
    Opens the outer hip — useful warm-up for lifters who run or squat heavy.
- name: "World's Greatest Stretch"
  form_description: |
    Ease into the World's Greatest Stretch slowly, letting the hamstrings lengthen rather than forcing the range. Find the position where you feel a clear stretch behind the thigh and hold it with steady breathing. Back off the moment a sharp sensation appears — that's the joint, not the muscle.
  common_mistakes: |
    - Bouncing in and out instead of holding a steady position
    - Rounding the lower back to chase more range
    - Holding the breath under tension
    - Forcing past pain instead of easing in
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the hamstrings — useful warm-up or recovery work between heavy hinge sessions.
- name: Wrist Circles
  form_description: |
    Ease into the Wrist Circles slowly, letting the tissue lengthen rather than forcing the range. Find the position where you feel a clear stretch in the target muscle and hold with steady breathing. Back off the moment a sharp sensation appears — the goal is mobility, not a fight with the joint.
  common_mistakes: |
    - Bouncing in and out of the stretch
    - Forcing past sharp pain
    - Holding the breath under tension
    - Letting the body twist sideways and dumping the stretch
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the target tissue — useful warm-up to clear a range or cool-down between heavy sessions.
- name: Wrist Roller
  form_description: |
    Set up for the Wrist Roller with the forearms supported and the wrists free to move through their full range. Curl the weight up by flexing through the wrist or rotating the forearm — the elbow stays still. Pause at the top of the contraction, then lower under control through a full stretch.
  common_mistakes: |
    - Lifting the elbow off the support to cheat the rep
    - Rushing the eccentric and missing the stretch
    - Going so heavy the grip fails before the forearm does
    - Half-repping at the top of the contraction
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Direct loading for the forearms — builds the grip strength that holds heavy compounds together.
- name: Wrist Rotations with Straight Bar
  form_description: |
    Set up for the Wrist Rotations with Straight Bar with the forearms supported and the wrists free to move through their full range. Curl the weight up by flexing through the wrist or rotating the forearm — the elbow stays still. Pause at the top of the contraction, then lower under control through a full stretch.
  common_mistakes: |
    - Lifting the elbow off the support to cheat the rep
    - Rushing the eccentric and missing the stretch
    - Going so heavy the grip fails before the forearm does
    - Half-repping at the top of the contraction
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Direct loading for the forearms — builds the grip strength that holds heavy compounds together.
- name: Yoke Walk
  form_description: |
    Set up for the Yoke Walk with the implement racked or gripped in the strongest position. Move the load through its full path under steady control — the implement is heavy and form is what keeps the joints intact. Finish the rep or carry in a stable position before resetting for the next attempt.
  common_mistakes: |
    - Letting the lower back round under heavy load
    - Going past clean form to add reps or distance
    - Skipping warm-up sets and going straight to heavy
    - Holding the breath through the whole rep — brace and breathe in cycles
  breathing_cues: |
    Breathe in cycles — brace for the rep, exhale briefly between reps.
  primary_benefit: |
    Builds whole-body strength under awkward load — the kind of work that translates to real-world lifting.
- name: Zercher Squats
  form_description: |
    Get into the Zercher Squats with the chest tall and the upper back braced before the descent. Lower under control by bending the knees and hips together — knees track over the toes the whole way. Reverse the descent by driving through the heels and mid-foot until you reach the top position.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Loads the quads heavily through a long range — a foundational lift for adding leg size and strength.
- name: Zottman Curl
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Builds the biceps in a strict pulling line — the bread-and-butter arm lift across every programme.
- name: Zottman Preacher Curl
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
