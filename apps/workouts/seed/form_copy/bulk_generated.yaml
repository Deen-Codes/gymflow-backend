- name: Clock Push-Up
  form_description: |
    Take the Clock Push-Up starting position with the wrists stacked over the elbows and the chest up. Lower the weight under control to the chest with the elbows tucked at roughly 45° to the body. Press up in a straight line over the shoulders, squeezing the chest at the top without rolling the shoulders forward.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the chest under heavy load through a long range — the foundational pressing lift for size and strength.
- name: Close-Grip Barbell Bench Press
  form_description: |
    Set up for the Close-Grip Barbell Bench Press with the upper arms in a fixed position and the elbows pinned where they belong. Hinge at the elbow only, lowering the weight through a long range. Extend back up by driving through the triceps until the arm is straight, keeping the upper arms still.
  common_mistakes: |
    - Letting the upper arms drift back so the shoulders take over
    - Flaring the elbows wide
    - Bouncing the weight at the bottom
    - Locking out so hard the elbows hyperextend
  breathing_cues: |
    Inhale on the descent, exhale on the extension.
  primary_benefit: |
    Loads the long head of the triceps under stretch — the most efficient way to add arm thickness.
- name: Close-Grip Dumbbell Press
  form_description: |
