- name: Squat with Plate Movers
  form_description: |
    Set up for the Squat with Plate Movers with the feet at hip-to-shoulder width, toes turned out slightly. Descend by sitting between the hips, keeping the torso angle steady and the heels planted. Drive up through mid-foot to stand, stopping just short of locking out at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
