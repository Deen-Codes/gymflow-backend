- name: Dumbbell Clean
  form_description: |
    Take the Dumbbell Clean stance with a flat back and the chest up before the hinge begins. Lower by sliding the hips back and feeling the hamstrings load — the knees stay soft, not breaking forward. Drive the hips forward to stand tall, squeezing the glutes at the top without leaning back.
  common_mistakes: |
