- name: Jogging, Treadmill
  form_description: |
    Set up for the Jogging, Treadmill with the body in a clean working position and the breath ready to settle into rhythm. Work at an effort that matches the session — easy aerobic, threshold, or sprint — rather than starting hot. Keep the form clean through the whole bout; fatigue should slow you down, not break your posture.
  common_mistakes: |
    - Starting too hard and blowing up the second half of the session
    - Letting form break as fatigue sets in
    - Mouth-breathing only — keep some nasal work in for aerobic sets
    - Skipping the cool-down and stacking cardiovascular stress
  breathing_cues: |
    Breathe in rhythm with the work — nasal where you can, mouth-and-nose at higher efforts.
  primary_benefit: |
    Builds cardiovascular base — useful for recovery between heavy sessions and for long-term work capacity.
- name: Keg Load
  form_description: |
    Set up for the Keg Load with the implement racked or gripped in the strongest position. Move the load through its full path under steady control — the implement is heavy and form is what keeps the joints intact. Finish the rep or carry in a stable position before resetting for the next attempt.
  common_mistakes: |
    - Letting the lower back round under heavy load
    - Going past clean form to add reps or distance
    - Skipping warm-up sets and going straight to heavy
    - Holding the breath through the whole rep — brace and breathe in cycles
  breathing_cues: |
    Breathe in cycles — brace for the rep, exhale briefly between reps.
  primary_benefit: |
    Builds whole-body strength under awkward load — the kind of work that translates to real-world lifting.
- name: Kettlebell Arnold Press
  form_description: |
