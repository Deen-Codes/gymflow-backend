- name: Single-Leg Leg Extension
  form_description: |
    Set up for the Single-Leg Leg Extension with the back supported and the lower-shin pad sitting just above the ankle. Drive the foot up by squeezing the quad — let the rest of the body stay still. Lower under control to roughly 90° of knee bend before the next rep.
  common_mistakes: |
    - Slamming into full extension and stressing the knee
    - Lifting the hips off the seat for leverage
    - Half-repping — not fully contracting at the top
    - Rushing the lower and missing the eccentric
  breathing_cues: |
    Inhale at the bottom, exhale as you extend.
  primary_benefit: |
    Direct quad loading at full extension — fills out the front of the thigh in a way compounds alone underdose.
