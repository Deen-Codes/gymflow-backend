- name: Bent-Knee Hip Raise
  form_description: |
    Get into the Bent-Knee Hip Raise starting position with the ribs stacked over the hips and the lower back pressed lightly into the floor or pad. Drive the ribcage towards the hips by shortening the abs, not by hinging at the hips. Pause for a beat at the top contraction, then lower under control without losing tension.
