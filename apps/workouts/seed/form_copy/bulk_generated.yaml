- name: Reverse Crunch
  form_description: |
    Set up for the Reverse Crunch with the spine neutral and the lower back kept flat — no arching, no lifting the hips. Drive the ribcage towards the hips by shortening the abs, not by hinging at the hips. Squeeze at the top, then return under tight control rather than dropping into the next rep.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Loads the abs through a controlled spinal flexion — useful for adding direct ab volume that crunches alone underdose.
- name: Reverse Flyes With External Rotation
  form_description: |
    Set up for the Reverse Flyes With External Rotation with the torso tipped forward and a soft bend in the elbows. Raise the arms out to the sides by driving through the elbows — not by yanking with the hands. Stop when the upper arms are roughly parallel to the floor, squeeze through the rear delts and shoulder blades, then lower under control.
  common_mistakes: |
    - Standing too upright and turning it into a row
    - Using momentum to swing the weights up
    - Lifting with the traps instead of the rear delts
    - Locking the elbows straight under load
  breathing_cues: |
    Exhale as you raise, inhale on the lower.
  primary_benefit: |
    Isolates the rear delts — the cheapest insurance against pressing-heavy shoulder pain.
- name: Reverse Grip Triceps Pushdown
  form_description: |
    Stand square to the cable with the elbows pinned to the sides. Press the handle down by extending the elbow, finishing with the arms fully straight beside the hips. Squeeze the triceps at lockout, then return under control without letting the elbows drift forward.
  common_mistakes: |
    - Letting the elbows flare out from the body
    - Using the shoulder to press the handle down
    - Cutting the range short before full extension
    - Leaning the torso over the handle to push the weight
  breathing_cues: |
    Inhale at the top, exhale as you press down.
  primary_benefit: |
    Loads the triceps through a long range with constant tension — clean volume for arm size without spinal load.
- name: Reverse Hyperextension
  form_description: |
    Set up for the Reverse Hyperextension with the feet hip-width, knees softly bent, and the bar or weight close to the body. Lower by sliding the hips back and feeling the hamstrings load — the knees stay soft, not breaking forward. Drive the hips forward to stand tall, squeezing the glutes at the top without leaning back.
  common_mistakes: |
    - Rounding the lower back to chase range
    - Bending the knees through the lift — turns it into a squat
    - Going so heavy the hamstrings can't control the lower
    - Hyperextending the lower back at lockout
  breathing_cues: |
    Big breath at the top, brace through the hinge, exhale on the way up.
  primary_benefit: |
    Loads the hamstrings under deep stretch — the highest-output way to build hamstring size and posterior-chain strength.
- name: Reverse Machine Flyes
  form_description: |
    Set up for the Reverse Machine Flyes with the torso tipped forward and a soft bend in the elbows. Raise the arms out to the sides by driving through the elbows — not by yanking with the hands. Stop when the upper arms are roughly parallel to the floor, squeeze through the rear delts and shoulder blades, then lower under control.
