- name: Middle Back Shrug
  form_description: |
    Set up for the Middle Back Shrug with the arms relaxed at the start and the shoulder blade ready to retract. Pull through the elbow line, keeping the wrist neutral and the lat firing first. Pause at the peak, then lower under control so the back stays loaded on the way down.
  common_mistakes: |
    - Letting the biceps take over the pull
    - Twisting the torso to gain range
    - Shrugging the shoulder up at the top of the rep
    - Cutting the bottom stretch short
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Isolates the back fibres without the systemic load of a compound row — useful for adding back volume late in a session.
- name: Middle Back Stretch
  form_description: |
    Ease into the Middle Back Stretch slowly, letting the tissue lengthen rather than forcing the range. Find the position where you feel a clear stretch in the target muscle and hold with steady breathing. Back off the moment a sharp sensation appears — the goal is mobility, not a fight with the joint.
  common_mistakes: |
    - Bouncing in and out of the stretch
    - Forcing past sharp pain
    - Holding the breath under tension
    - Letting the body twist sideways and dumping the stretch
  breathing_cues: |
    Breathe slowly and steadily — exhale a little deeper into each hold.
  primary_benefit: |
    Lengthens the target tissue — useful warm-up to clear a range or cool-down between heavy sessions.
- name: Mixed Grip Chin
  form_description: |
