  primary_benefit: |
    Trains full-body coordination under load — the highest-output lift for athletic power, but only useful with clean technique.
- name: Power Stairs
  form_description: |
    Set up for the Power Stairs with the implement racked or gripped in the strongest position. Move the load through its full path under steady control — the implement is heavy and form is what keeps the joints intact. Finish the rep or carry in a stable position before resetting for the next attempt.
  common_mistakes: |
    - Letting the lower back round under heavy load
    - Going past clean form to add reps or distance
    - Skipping warm-up sets and going straight to heavy
    - Holding the breath through the whole rep — brace and breathe in cycles
  breathing_cues: |
    Breathe in cycles — brace for the rep, exhale briefly between reps.
  primary_benefit: |
    Builds whole-body strength under awkward load — the kind of work that translates to real-world lifting.
- name: Preacher Hammer Dumbbell Curl
  form_description: |
    Stand or sit tall with the weight held at arm's length, elbows pinned to the sides. Curl the weight up by flexing the biceps — the elbows should stay locked in place, not drift forward. Squeeze at the top, then lower to a full stretch without letting the shoulders roll forward.
  common_mistakes: |
    - Swinging the elbows forward to fold the weight up
    - Using the lower back to heave the weight
    - Cutting the bottom range short and missing the stretch
    - Letting the wrists hyperextend under load
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Loads the biceps directly — a clean way to add arm volume without leaning on compound pulls.
- name: Press Sit-Up
  form_description: |
    Set up for the Press Sit-Up with the spine neutral and the lower back kept flat — no arching, no lifting the hips. Curl the torso up by contracting the abs, leading with the chest rather than yanking with the arms. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    A direct ab loader that scales with tempo — slow the eccentric and the muscle does more work per rep.
- name: Prone Manual Hamstring
  form_description: |
    Get into the Prone Manual Hamstring position with the hips planted and the lower legs free to move through the full curl. Drive the heels back by squeezing the hamstrings — keep the rest of the body still. Hold the top contraction for a beat, then return slowly so the hamstrings eccentric-load.
  common_mistakes: |
    - Lifting the hips off the bench to gain range
    - Banging the stack at the bottom (no controlled eccentric)
    - Half-repping — the top contraction is where it matters
    - Pad placed too far up the calf, working the achilles instead
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Isolates the hamstrings at the knee — grows the lower hamstring belly that hip-hinge work alone leaves behind.
- name: Prowler Sprint
  form_description: |
    Set up for the Prowler Sprint with the body in a clean working position and the breath ready to settle into rhythm. Work at an effort that matches the session — easy aerobic, threshold, or sprint — rather than starting hot. Keep the form clean through the whole bout; fatigue should slow you down, not break your posture.
  common_mistakes: |
    - Starting too hard and blowing up the second half of the session
    - Letting form break as fatigue sets in
    - Mouth-breathing only — keep some nasal work in for aerobic sets
    - Skipping the cool-down and stacking cardiovascular stress
  breathing_cues: |
    Breathe in rhythm with the work — nasal where you can, mouth-and-nose at higher efforts.
  primary_benefit: |
    Builds cardiovascular base — useful for recovery between heavy sessions and for long-term work capacity.
- name: Pull Through
  form_description: |
    Set up for the Pull Through with the upper back braced, hips loaded, and feet planted shoulder-width. Drive the hips up by squeezing the glutes — the upper back stays in contact with the pad or floor through the rep. Pause for a beat at the top, then lower under control. Don't extend the lower back to chase more range.
  common_mistakes: |
    - Hyperextending the lower back at the top instead of driving from the glutes
    - Pushing through the toes instead of mid-foot
    - Cutting the top contraction short
    - Letting the knees cave inward on the drive up
  breathing_cues: |
    Inhale at the bottom, exhale as you drive the hips up.
  primary_benefit: |
    Loads the glutes at peak contraction — the most efficient hip-hinge variant for building glute size.
- name: Pullups
  form_description: |
    Set up for the Pullups with the thigh pad snug, arms fully extended overhead, and the shoulder blades pulled down out of the shrug. Pull by driving the elbows down towards the ribs, feeling the lats engage before the arms take over. Squeeze at the bottom of the pull, then return under control to a full overhead stretch.
  common_mistakes: |
    - Pulling the bar behind the neck — rotator cuff stress
    - Leaning back hard and turning it into a row
    - Yanking with the biceps instead of leading with the lats
    - Cutting the top stretch short between reps
  breathing_cues: |
    Inhale at the top, exhale as you pull down.
  primary_benefit: |
    Loads the lats through a long overhead stretch — the most efficient way to add back width.
- name: Push Press - Behind the Neck
  form_description: |
    Set up for the Push Press - Behind the Neck with the bar over mid-foot, hip-width stance, and a flat back. Move the bar in a vertical line, staying tight through the upper back and finishing the lift with full hip and knee extension. Catch in a stable position with the bar racked or overhead, then reset before the next rep.
  common_mistakes: |
    - Letting the bar drift away from the body off the floor
    - Cutting the hip extension short before the pull finishes
    - Catching with the knees collapsed inward
    - Going too heavy before the technique is clean
  breathing_cues: |
    Big breath at the bottom, brace through the lift, exhale at the top.
  primary_benefit: |
    Trains full-body coordination under load — the highest-output lift for athletic power, but only useful with clean technique.
- name: Push Up to Side Plank
  form_description: |
    Take the Push Up to Side Plank starting position with the wrists stacked over the elbows and the chest up. Descend until the elbows pass roughly the line of the body, keeping tension through the chest. Press up in a straight line over the shoulders, squeezing the chest at the top without rolling the shoulders forward.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the chest under heavy load through a long range — the foundational pressing lift for size and strength.
- name: Push-Up Wide
  form_description: |
    Set up for the Push-Up Wide with the shoulder blades pinned back and down, feet planted firmly. Lower the weight under control to the chest with the elbows tucked at roughly 45° to the body. Drive the weight back up by squeezing the chest, stopping just short of a hard lockout.
  common_mistakes: |
