  primary_benefit: |
    A direct ab loader that scales with tempo — slow the eccentric and the muscle does more work per rep.
- name: Oblique Crunches - On The Floor
  form_description: |
    Get into the Oblique Crunches - On The Floor starting position with the ribs stacked over the hips and the lower back pressed lightly into the floor or pad. Drive the ribcage towards the hips by shortening the abs, not by hinging at the hips. Hold the top position for a count, then return slowly so the abs eccentric-load on the way down.
