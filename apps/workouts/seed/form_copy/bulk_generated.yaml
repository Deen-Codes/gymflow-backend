- name: Alternating Kettlebell Row
  form_description: |
    Get into the Alternating Kettlebell Row position with the spine neutral and the working arm under steady control. Pull through the elbow line, keeping the wrist neutral and the lat firing first. Squeeze the contraction briefly, then return slowly to a full stretch.
  common_mistakes: |
    - Letting the biceps take over the pull
    - Twisting the torso to gain range
    - Shrugging the shoulder up at the top of the rep
    - Cutting the bottom stretch short
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Isolates the back fibres without the systemic load of a compound row — useful for adding back volume late in a session.
- name: Alternating Renegade Row
  form_description: |
    Set up for the Alternating Renegade Row with the chest up, shoulder blades pulled down, and arms fully extended. Pull by driving the elbows back, leading with the elbow rather than yanking with the hands. Pause briefly at the contraction, then lower slowly so the back eccentric-loads.
  common_mistakes: |
    - Pulling with the biceps instead of the back
    - Shrugging the shoulders up at the top instead of squeezing back
    - Cutting the bottom range short and missing the stretch
    - Using body english to throw the weight up
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Builds mid-back and lat thickness through a long pulling range — the backbone of any back day.
- name: Ankle Circles
  form_description: |
    Ease into the Ankle Circles with the heel pressing down and the front foot supporting the body. Hold the position where you feel a clear stretch through the calf, breathing steadily. Back off if you feel sharp pain in the achilles — the stretch should sit in the belly of the muscle.
  common_mistakes: |
    - Bouncing into and out of the stretch
    - Forcing past sharp pain
    - Letting the foot roll out and dumping the stretch
    - Holding the breath under tension
  breathing_cues: |
    Breathe slowly and steadily — exhale into each hold.
  primary_benefit: |
    Opens the calves and achilles — useful warm-up before sprinting or jumping work.
- name: Ankle On The Knee
