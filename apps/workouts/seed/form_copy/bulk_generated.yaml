- name: Side Bridge
  form_description: |
    Set up for the Side Bridge with the shoulders stacked over the elbows or hands and the heels reaching back. Brace the abs hard, glutes squeezed, and hold the position without letting the lower back collapse. End the set when the hips start dropping — quality time beats sloppy seconds.
  common_mistakes: |
    - Letting the hips sag and dumping the load into the lower back
    - Piking the hips up to make the hold easier
    - Holding the breath — keep it shallow and steady
    - Chasing time past the point of clean form
  breathing_cues: |
    Keep the breath shallow and steady through the hold, no holding.
  primary_benefit: |
    Builds anti-extension strength through the trunk — the kind of stability that protects the lower back under heavy compounds.
- name: Side Hop-Sprint
  form_description: |
    Set up for the Side Hop-Sprint with the feet hip-to-shoulder width and the knees softly loaded. Move with intent rather than maximum speed — quality of contact matters more than rep count. Land soft on the balls of the feet, absorbing through the knees and hips, before resetting for the next rep.
  common_mistakes: |
    - Landing flat-footed and dumping the load into the joints
    - Letting the knees cave inward on each landing
    - Going past clean form for extra reps
    - Skipping the reset between reps and stacking fatigue
  breathing_cues: |
    Breathe in time with each rep — exhale on the contact, inhale on the reset.
  primary_benefit: |
    Trains rate of force development — builds the kind of speed that translates to sport, not just weight on the bar.
- name: Side Jackknife
  form_description: |
    Take the start position with the head neutral and the chin off the chest — don't pull on the neck to fold up. Curl the torso up by contracting the abs, leading with the chest rather than yanking with the arms. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Trains the abs under steady tension — the kind of work that builds ab thickness rather than just endurance.
- name: Side Lateral Raise
  form_description: |
    Stand or sit with the weights at the sides, elbows softly bent. Raise the arms out in a smooth arc, leading with the elbows, until the upper arms reach parallel with the floor. Stop there — going higher recruits the traps. Lower slowly; the lengthening phase is where the side delts grow.
  common_mistakes: |
    - Swinging the weights up with momentum
    - Going past parallel and shrugging the traps in
    - Locking the elbows straight under load
    - Rotating the wrists down (pour-the-jug) — shifts work off the side delt
  breathing_cues: |
    Inhale at the bottom, exhale as you raise the arms.
  primary_benefit: |
    Direct loading for the side delts — builds shoulder width that pressing alone underdose.
- name: Side Laterals to Front Raise
