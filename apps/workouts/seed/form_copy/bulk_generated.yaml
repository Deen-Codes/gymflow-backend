    Opens the glute and external rotators of the hip — useful warm-up before squats or hinges.
- name: One Leg Barbell Squat
  form_description: |
    Take the One Leg Barbell Squat stance with the feet flat and the weight loaded over mid-foot. Bend the knees and hips together to lower into the bottom — let the chest stay up rather than tipping forward. Drive up through mid-foot to stand, stopping just short of locking out at the top.
  common_mistakes: |
    - Knees caving inward on the drive up
    - Rounding the lower back at the bottom of the descent
    - Cutting depth short and never letting the quads load
    - Locking out hard and resting on the joint instead of the muscle
  breathing_cues: |
    Big breath at the top, brace through the descent, exhale on the way up.
  primary_benefit: |
    Works the quads and glutes together with serious weight — the lift other leg work is measured against.
- name: One-Arm Dumbbell Row
  form_description: |
    Set up for the One-Arm Dumbbell Row with the chest up, shoulder blades pulled down, and arms fully extended. Pull by driving the elbows back, leading with the elbow rather than yanking with the hands. Pause briefly at the contraction, then lower slowly so the back eccentric-loads.
  common_mistakes: |
    - Pulling with the biceps instead of the back
    - Shrugging the shoulders up at the top instead of squeezing back
    - Cutting the bottom range short and missing the stretch
    - Using body english to throw the weight up
  breathing_cues: |
    Inhale at the stretch, exhale on the pull.
  primary_benefit: |
    Builds mid-back and lat thickness through a long pulling range — the backbone of any back day.
- name: One-Arm Flat Bench Dumbbell Flye
  form_description: |
    Take the One-Arm Flat Bench Dumbbell Flye starting position with the chest tall and the shoulder blades pinned down. Lower under control through a long stretch, keeping the elbow angle fixed. Bring the hands back together by squeezing the chest fibres — the elbows stay in their fixed bend.
  common_mistakes: |
    - Bending the elbows mid-rep to turn it into a press
    - Letting the hands fly open at the bottom and yank the shoulder
    - Shrugging the shoulders up to assist the squeeze
    - Cutting the bottom range short and missing the chest stretch
  breathing_cues: |
    Inhale as the arms open, exhale as you squeeze them together.
  primary_benefit: |
    Isolates the chest under direct tension — grows the inner pec line without overloading the shoulder.
- name: One-Arm High-Pulley Cable Side Bends
  form_description: |
    Take the start position with the head neutral and the chin off the chest — don't pull on the neck to fold up. Drive the ribcage towards the hips by shortening the abs, not by hinging at the hips. Pause for a beat at the top contraction, then lower under control without losing tension.
  common_mistakes: |
    - Yanking on the neck with the hands to add range
    - Hinging at the hips instead of curling the spine
    - Bouncing reps off the bottom for momentum
    - Cutting the descent short and missing the eccentric
  breathing_cues: |
    Exhale as you curl up, inhale on the lower.
  primary_benefit: |
    Loads the abs through a controlled spinal flexion — useful for adding direct ab volume that crunches alone underdose.
- name: One-Arm Incline Lateral Raise
  form_description: |
    Stand or sit with the weights at the sides, elbows softly bent. Raise the arms out in a smooth arc, leading with the elbows, until the upper arms reach parallel with the floor. Stop there — going higher recruits the traps. Lower slowly; the lengthening phase is where the side delts grow.
  common_mistakes: |
    - Swinging the weights up with momentum
    - Going past parallel and shrugging the traps in
    - Locking the elbows straight under load
    - Rotating the wrists down (pour-the-jug) — shifts work off the side delt
  breathing_cues: |
    Inhale at the bottom, exhale as you raise the arms.
  primary_benefit: |
    Direct loading for the side delts — builds shoulder width that pressing alone underdose.
- name: One-Arm Kettlebell Clean
  form_description: |
    Take the One-Arm Kettlebell Clean stance with a flat back and the chest up before the hinge begins. Lower by sliding the hips back and feeling the hamstrings load — the knees stay soft, not breaking forward. Reverse the hinge by pushing the hips through, finishing upright without overextending the lower back.
  common_mistakes: |
    - Rounding the lower back to chase range
    - Bending the knees through the lift — turns it into a squat
    - Going so heavy the hamstrings can't control the lower
    - Hyperextending the lower back at lockout
  breathing_cues: |
    Big breath at the top, brace through the hinge, exhale on the way up.
  primary_benefit: |
    Loads the hamstrings under deep stretch — the highest-output way to build hamstring size and posterior-chain strength.
- name: One-Arm Kettlebell Clean and Jerk
  form_description: |
    Set up for the One-Arm Kettlebell Clean and Jerk sitting or standing tall with the ribs braced and the wrists stacked over the elbows. Press the weight up smoothly until the elbows are nearly straight, finishing the weight slightly above and just inside the line of the shoulders. Lower under control to roughly ear height — deeper than that puts the front delt under unfriendly stretch.
  common_mistakes: |
    - Arching the lower back hard to push the press
    - Letting the elbows flare wider than the line of the wrists
    - Locking out so hard the shoulders shrug up
    - Slamming the handles into each other at the top
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the front and side delts under heavy overhead load — the workhorse shoulder builder.
- name: One-Arm Kettlebell Floor Press
  form_description: |
    Set up for the One-Arm Kettlebell Floor Press with the shoulder blades pinned back and down, feet planted firmly. Lower the weight under control to the chest with the elbows tucked at roughly 45° to the body. Press up in a straight line over the shoulders, squeezing the chest at the top without rolling the shoulders forward.
  common_mistakes: |
    - Flaring the elbows to 90° and stressing the front delt
    - Bouncing the weight off the chest at the bottom
    - Lifting the hips off the bench or seat to push more weight
    - Letting the shoulders roll forward at lockout
  breathing_cues: |
    Inhale on the descent, exhale through the press.
  primary_benefit: |
    Builds the chest under heavy load through a long range — the foundational pressing lift for size and strength.
