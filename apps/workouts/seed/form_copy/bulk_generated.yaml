- name: Seated Dumbbell Palms-Down Wrist Curl
  form_description: |
    Set up for the Seated Dumbbell Palms-Down Wrist Curl with the forearms supported and the wrists free to move through their full range. Curl the weight up by flexing through the wrist or rotating the forearm — the elbow stays still. Pause at the top of the contraction, then lower under control through a full stretch.
  common_mistakes: |
    - Lifting the elbow off the support to cheat the rep
    - Rushing the eccentric and missing the stretch
    - Going so heavy the grip fails before the forearm does
    - Half-repping at the top of the contraction
  breathing_cues: |
    Inhale at the bottom, exhale as you curl up.
  primary_benefit: |
    Direct loading for the forearms — builds the grip strength that holds heavy compounds together.
- name: Seated Dumbbell Palms-Up Wrist Curl
  form_description: |
