<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GymFlow{% endblock %}</title>
    <style>
        :root {
            --bg-1: #0b1020;
            --bg-2: #11182b;
            --card: rgba(255,255,255,0.06);
            --stroke: rgba(255,255,255,0.10);
            --text: #f5f7fb;
            --muted: #aab4c8;
            --blue: #4da3ff;
            --blue-2: #7ab8ff;
            --green: #33d17a;
            --red: #ff6b6b;
            --orange: #ff9f43;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
            min-height: 100vh;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .container {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
        }

        .glass {
            background: var(--card);
            border: 1px solid var(--stroke);
            border-radius: 24px;
            backdrop-filter: blur(10px);
        }

        .btn {
            border: none;
            border-radius: 16px;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            color: white;
            background: linear-gradient(90deg, var(--blue), var(--blue-2));
        }

        .btn-secondary {
            color: white;
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--stroke);
        }

        .input,
        select {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--stroke);
            border-radius: 14px;
            padding: 14px 16px;
            color: white;
            font-size: 15px;
        }

        .input::placeholder {
            color: var(--muted);
        }

        .label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .messages {
            display: grid;
            gap: 10px;
            margin-bottom: 18px;
        }

        .message {
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 14px;
        }

        .message.success {
            background: rgba(51, 209, 122, 0.16);
            border: 1px solid rgba(51, 209, 122, 0.30);
        }

        .message.error {
            background: rgba(255, 107, 107, 0.16);
            border: 1px solid rgba(255, 107, 107, 0.30);
        }

        .muted {
            color: var(--muted);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
