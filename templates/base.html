<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GymFlow{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --bg-soft: #eef3f8;
            --panel: #ffffff;
            --panel-2: #f8fbff;
            --stroke: #dbe5f0;
            --stroke-strong: #c9d7e6;

            --text: #162033;
            --text-soft: #5f6f86;
            --text-faint: #8a99ad;

            --blue: #4f95f5;
            --blue-strong: #337fe8;
            --blue-soft: #eaf3ff;

            --green: #2fbf71;
            --red: #e35d6a;
            --orange: #f59f43;

            --shadow-sm: 0 2px 10px rgba(18, 34, 66, 0.05);
            --shadow-md: 0 12px 28px rgba(22, 32, 51, 0.08);

            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #f7faff 0%, #eef3f8 100%);
            color: var(--text);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        .container {
            width: min(1280px, calc(100% - 40px));
            margin: 0 auto;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--stroke);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
        }

        .card-soft {
            background: var(--panel-2);
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
        }

        .glass {
            background: var(--panel);
            border: 1px solid var(--stroke);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
        }

        .btn {
            border: 1px solid transparent;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.18s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            color: #fff;
            background: linear-gradient(180deg, var(--blue), var(--blue-strong));
            box-shadow: 0 8px 18px rgba(79, 149, 245, 0.22);
        }

        .btn-primary:hover {
            filter: brightness(1.02);
        }

        .btn-secondary {
            color: var(--text);
            background: #fff;
            border-color: var(--stroke);
        }

        .btn-secondary:hover {
            background: var(--bg-soft);
        }

        .btn-ghost {
            color: var(--text-soft);
            background: transparent;
            border-color: transparent;
        }

        .btn-ghost:hover {
            background: var(--bg-soft);
            color: var(--text);
        }

        .input,
        select,
        textarea {
            width: 100%;
            background: #fff;
            border: 1px solid var(--stroke);
            border-radius: 14px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }

        textarea {
            resize: vertical;
            min-height: 110px;
        }

        .input::placeholder,
        textarea::placeholder {
            color: var(--text-faint);
        }

        .input:focus,
        select:focus,
        textarea:focus {
            border-color: rgba(79, 149, 245, 0.8);
            box-shadow: 0 0 0 4px rgba(79, 149, 245, 0.12);
        }

        .label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-soft);
            margin-bottom: 8px;
        }

        .muted {
            color: var(--text-soft);
        }

        .faint {
            color: var(--text-faint);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border-radius: 999px;
            border: 1px solid var(--stroke);
            background: #fff;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-soft);
        }

        .badge-blue {
            background: var(--blue-soft);
            border-color: #cfe0fb;
            color: var(--blue-strong);
        }

        .badge-green {
            background: #ecfbf3;
            border-color: #ccefdc;
            color: #20955a;
        }

        .badge-red {
            background: #fff1f3;
            border-color: #f4cfd5;
            color: #c94d5d;
        }

        .section-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .messages {
            display: grid;
            gap: 10px;
            margin-bottom: 18px;
        }

        .message {
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 14px;
            border: 1px solid transparent;
        }

        .message.success {
            background: rgba(47, 191, 113, 0.10);
            border-color: rgba(47, 191, 113, 0.22);
            color: #187347;
        }

        .message.error {
            background: rgba(227, 93, 106, 0.10);
            border-color: rgba(227, 93, 106, 0.22);
            color: #b23b49;
        }

        .divider {
            height: 1px;
            background: var(--stroke);
            width: 100%;
        }

        .icon-dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: var(--blue);
            display: inline-block;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
