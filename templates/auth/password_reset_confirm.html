{% extends "base.html" %}

{% block title %}Set New Password | GymFlow{% endblock %}

{% block content %}
<div class="container" style="min-height:100vh;display:grid;place-items:center;padding:32px 0;">
    <div class="glass" style="width:min(520px,100%);padding:32px;">
        <div style="font-size:30px;font-weight:800;margin-bottom:6px;">Set New Password</div>
        <div class="muted" style="margin-bottom:24px;">Choose a new password for your account.</div>

        <form method="post" style="display:grid;gap:16px;">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary" style="width:100%;">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
