{% extends "base.html" %}

{% block title %}Reset Password | GymFlow{% endblock %}

{% block content %}
<div class="container" style="min-height:100vh;display:grid;place-items:center;padding:32px 0;">
    <div class="glass" style="width:min(520px,100%);padding:32px;">
        <div style="font-size:30px;font-weight:800;margin-bottom:6px;">Reset Password</div>
        <div class="muted" style="margin-bottom:24px;">Enter your email and we’ll send you a reset link.</div>

        <form method="post" style="display:grid;gap:16px;">
            {% csrf_token %}
            <div>
                <label class="label">Email</label>
                <input class="input" type="email" name="email" placeholder="Enter your email">
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">Send Reset Link</button>
        </form>

        <div style="margin-top:16px;">
            <a href="{% url 'trainer-login-page' %}" class="muted">← Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
