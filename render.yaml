services:
  - type: web
    name: gymflow-api
    runtime: python
    # Starter (paid) — free-tier services sleep after ~15 min of
    # inactivity, and the cold-start path takes 30-60s before any
    # request reaches gunicorn. Combined with a 30-50s Anthropic
    # call that blows past Render's free-tier router timeout and
    # returns 503 with no log line on our side. Starter doesn't
    # sleep, so cold starts disappear and the AI build endpoints
    # are reachable on first hit. ($7/month — the cost of one
    # AI build's $0.17 spend × 40 calls. Pays for itself the
    # moment a single user buys Pro AI.)
    plan: starter
    buildCommand: ./build.sh
    # `--timeout 120` raises gunicorn's worker timeout from the
    # default 30s. Without this, AI tool-use generations (which
    # can take 30-50s) get the worker killed mid-request — the
    # caller sees 503 even though Anthropic completed the work
    # AND billed for the tokens. Python-level request timeouts
    # (`requests.post(..., timeout=70)`) are meaningless without
    # this — gunicorn nukes the worker first.
    # `--graceful-timeout 30` keeps shutdowns snappy when Render
    # restarts the service.
    startCommand: gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --timeout 120 --graceful-timeout 30

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: DEBUG
        value: "False"

      - key: SECRET_KEY
        generateValue: true

      # Comma-separated host list. Leading dot = match all subdomains.
      # `.gymflow.coach` covers every trainer subdomain plus the apex.
      - key: ALLOWED_HOSTS
        value: .gymflow.coach,.onrender.com

      # Enables the /api/users/_debug/set-state/ endpoint so the
      # iOS Profile DEBUG panel can flip tier (free/pro/pro_ai)
      # and reset the AI-build preview flag server-side. Each
      # authenticated solo user can only mutate their own row.
      # *** REMOVE OR SET TO "0" BEFORE APP STORE SUBMISSION ***
      # — leaving this on lets a user upgrade themselves to
      # Pro AI without paying through IAP.
      - key: ENABLE_DEBUG_RESET
        value: "1"

databases:
  - name: gymflow-db
    plan: free